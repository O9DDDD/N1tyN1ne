<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>写作 · N1tyN1ne</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { overflow-y: auto; height: auto; padding-bottom: 0; }
    .write-layout {
      display: flex; flex-direction: column; height: 100vh;
    }
    /* Top bar */
    .write-top {
      display: flex; align-items: center; gap: 16px; padding: 8px 20px;
      background: var(--bg-card); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10;
    }
    .write-top .back-link {
      color: var(--text-dim); font-size: .82rem; text-decoration: none;
      display: flex; align-items: center; gap: 4px; font-weight: 500;
      transition: var(--transition);
    }
    .write-top .back-link:hover { color: var(--accent); }
    .write-top .sep { width: 1px; height: 20px; background: var(--border); }
    .write-top input.title-input {
      flex: 1; border: none; background: transparent; font-size: 1.1rem;
      font-weight: 700; color: var(--text-bright); outline: none;
      font-family: var(--font); padding: 6px 0;
    }
    .write-top input.title-input::placeholder { color: #ccc; }
    .write-top .top-actions { display: flex; align-items: center; gap: 8px; }
    .write-top .status-badge {
      font-size: .7rem; padding: 4px 10px; border-radius: 99px; font-weight: 600;
    }
    .status-badge.draft { background: #fef3c7; color: #a16207; }
    .status-badge.published { background: #dcfce7; color: #166534; }
    .status-badge.saved { background: #e0f2fe; color: #075985; }

    /* Main area */
    .write-main {
      flex: 1; display: flex; overflow: hidden;
    }
    /* Editor panel */
    .editor-panel {
      flex: 1; overflow-y: auto; min-width: 0;
    }
    .editor-panel .EasyMDEContainer { height: 100%; border: none; border-radius: 0; }
    .editor-panel .EasyMDEContainer .CodeMirror {
      height: 100%; border: none; border-radius: 0; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: .9rem; line-height: 1.7; background: var(--bg); color: var(--text);
      padding: 20px;
    }
    .editor-panel .CodeMirror-cursor { border-left-color: var(--accent); }
    .editor-panel .editor-toolbar {
      border: none; border-bottom: 1px solid var(--border); border-radius: 0;
      background: var(--bg-card); padding: 4px 8px;
    }
    .editor-panel .editor-toolbar button {
      color: var(--text-dim); border-radius: 4px;
    }
    .editor-panel .editor-toolbar button:hover, .editor-panel .editor-toolbar button.active {
      background: var(--accent-glow); color: var(--accent-dark); border-color: transparent;
    }
    .editor-panel .editor-toolbar i.separator { border-left-color: var(--border); }

    /* Preview panel */
    .preview-panel {
      flex: 1; overflow-y: auto; padding: 28px 32px; min-width: 0;
      background: #fff; border-left: 1px solid var(--border);
      font-size: .94rem; line-height: 1.9; color: #333;
    }
    .preview-panel h1 { font-size: 1.6rem; font-weight: 800; color: #1a1a1a; margin-bottom: 12px; }
    .preview-panel h2 { font-size: 1.2rem; font-weight: 700; color: var(--accent-dark); margin: 28px 0 10px; }
    .preview-panel h3 { font-size: 1.02rem; font-weight: 700; margin: 20px 0 8px; }
    .preview-panel p { margin-bottom: 14px; }
    .preview-panel code {
      background: var(--bg-muted); padding: 2px 6px; border-radius: 3px;
      font-size: .85rem; color: var(--accent-dark);
    }
    .preview-panel pre {
      background: #1e1e1e; padding: 16px; border-radius: 8px;
      overflow-x: auto; margin-bottom: 14px; color: #d4d4d4; font-size: .82rem;
    }
    .preview-panel pre code { background: none; color: inherit; padding: 0; }
    .preview-panel blockquote {
      border-left: 3px solid var(--accent); padding: 4px 0 4px 16px;
      color: #888; margin-bottom: 14px; font-style: italic;
      background: var(--bg-muted); border-radius: 0 4px 4px 0;
    }
    .preview-panel img { max-width: 100%; border-radius: 8px; }
    .preview-panel table { width: 100%; border-collapse: collapse; font-size: .85rem; margin-bottom: 14px; }
    .preview-panel th, .preview-panel td { padding: 8px 12px; border: 1px solid var(--border); }
    .preview-panel th { background: var(--bg-muted); }
    .preview-panel .empty-preview {
      display: flex; align-items: center; justify-content: center; height: 100%;
      color: #ccc; font-size: 1rem; text-align: center;
    }

    /* Meta drawer */
    .meta-bar {
      display: flex; align-items: center; gap: 12px; padding: 8px 20px;
      background: var(--bg-card); border-top: 1px solid var(--border);
      flex-shrink: 0; font-size: .78rem;
    }
    .meta-bar input {
      padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 99px;
      background: var(--bg); color: var(--text); font-size: .78rem;
      outline: none; font-family: inherit; transition: border-color var(--transition);
    }
    .meta-bar input:focus { border-color: var(--accent); }
    .meta-bar .meta-label { color: var(--text-dim); font-weight: 500; }
    .meta-bar .tag-input { flex: 1; }
    .meta-bar .excerpt-input { flex: 2; }

    /* Responsive */
    @media (max-width: 768px) {
      .write-main { flex-direction: column; }
      .preview-panel { display: none; border-left: none; border-top: 1px solid var(--border); }
      .preview-panel.open { display: block; }
      .write-top { padding: 8px 12px; gap: 8px; }
      .write-top input.title-input { font-size: .95rem; }
      .meta-bar { flex-wrap: wrap; padding: 8px 12px; }
    }
  </style>
</head>
<body>

<div class="write-layout" id="writeApp" style="display:none">
  <!-- Top Bar -->
  <div class="write-top">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回</a>
    <span class="sep"></span>
    <input type="text" class="title-input" id="writeTitle" placeholder="文章标题...">
    <span class="status-badge saved" id="saveBadge" style="display:none">已保存</span>
    <div class="top-actions">
      <button class="btn btn-ghost btn-sm" id="togglePreview" onclick="togglePreview()">预览</button>
      <button class="btn btn-ghost btn-sm" id="saveDraftBtn" onclick="savePost(false)">存草稿</button>
      <button class="btn btn-primary btn-sm" id="publishBtn" onclick="savePost(true)">发布</button>
    </div>
  </div>

  <!-- Main -->
  <div class="write-main">
    <div class="editor-panel">
      <textarea id="writeEditor"></textarea>
    </div>
    <div class="preview-panel" id="previewPanel">
      <div class="empty-preview">实时预览将显示在这里</div>
    </div>
  </div>

  <!-- Meta Bar -->
  <div class="meta-bar">
    <span class="meta-label">标签</span>
    <input type="text" class="tag-input" id="writeTags" placeholder="技术, 生活, 音乐">
    <span class="meta-label">摘要</span>
    <input type="text" class="excerpt-input" id="writeExcerpt" placeholder="简短摘要...">
  </div>
</div>

<div id="writeLoading" style="margin-top:120px;text-align:center;color:var(--text-dim);font-size:.9rem">
  <p>加载中...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script src="js/supabase.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script>
// ─── Write Page ──────────────────────────────────────
let easyMDE = null;
let editingId = null;
let autoSaveTimer = null;
let isDirty = false;

document.addEventListener('DOMContentLoaded', async () => {
  await initAuth();
  if (!window._currentUser) {
    document.getElementById('writeLoading').innerHTML =
      '<p style="color:#dc2626">请先<a href="index.html" style="color:var(--accent)">登录</a></p>';
    return;
  }

  document.getElementById('writeApp').style.display = 'flex';
  document.getElementById('writeLoading').style.display = 'none';

  // Init EasyMDE
  easyMDE = new EasyMDE({
    element: document.getElementById('writeEditor'),
    spellChecker: false,
    placeholder: '开始写作...',
    toolbar: ['bold', 'italic', 'heading', '|', 'quote', 'unordered-list', 'ordered-list', '|', 'link', 'image', '|', 'code', 'table', 'horizontal-rule', '|', 'preview', 'fullscreen'],
    status: false,
    autoDownloadFontAwesome: false,
    renderingConfig: { singleLineBreaks: false }
  });

  // Auto-save
  easyMDE.codemirror.on('change', () => {
    isDirty = true;
    scheduleAutoSave();
    updatePreview();
  });
  document.getElementById('writeTitle').addEventListener('input', () => { isDirty = true; scheduleAutoSave(); });

  // Load existing post if editing
  const params = new URLSearchParams(window.location.search);
  editingId = params.get('id');
  if (editingId) {
    try {
      const post = await dbSelect('posts', { eq: { col: 'id', val: editingId }, single: true });
      if (post) {
        document.getElementById('writeTitle').value = post.title || '';
        easyMDE.value(post.content || '');
        document.getElementById('writeTags').value = (post.tags || []).join(', ');
        document.getElementById('writeExcerpt').value = post.excerpt || '';
        document.getElementById('publishBtn').textContent = post.published ? '更新' : '发布';
        document.getElementById('saveDraftBtn').textContent = post.published ? '转为草稿' : '存草稿';
      }
    } catch(e) {}
  }

  // Restore draft from localStorage
  const draft = loadDraft();
  if (draft && !editingId) {
    if (draft.title) document.getElementById('writeTitle').value = draft.title;
    if (draft.content) easyMDE.value(draft.content);
    if (draft.tags) document.getElementById('writeTags').value = draft.tags;
    if (draft.excerpt) document.getElementById('writeExcerpt').value = draft.excerpt;
  }

  updatePreview();
});

function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(autoSaveDraft, 3000);
}

function autoSaveDraft() {
  if (!isDirty) return;
  const draft = {
    title: document.getElementById('writeTitle').value,
    content: easyMDE ? easyMDE.value() : '',
    tags: document.getElementById('writeTags').value,
    excerpt: document.getElementById('writeExcerpt').value,
    time: Date.now()
  };
  localStorage.setItem(editingId ? 'write_draft_' + editingId : 'write_draft', JSON.stringify(draft));
  isDirty = false;
  const badge = document.getElementById('saveBadge');
  badge.style.display = 'inline';
  setTimeout(() => { badge.style.display = 'none'; }, 2000);
}

function loadDraft() {
  try {
    return JSON.parse(localStorage.getItem(editingId ? 'write_draft_' + editingId : 'write_draft'));
  } catch(e) { return null; }
}

function clearDraft() {
  localStorage.removeItem(editingId ? 'write_draft_' + editingId : 'write_draft');
}

function updatePreview() {
  const panel = document.getElementById('previewPanel');
  const content = easyMDE ? easyMDE.value() : '';
  if (!content.trim()) {
    panel.innerHTML = '<div class="empty-preview">实时预览将显示在这里</div>';
    return;
  }
  panel.innerHTML = marked.parse(content);
  panel.querySelectorAll('a').forEach(a => a.setAttribute('target', '_blank'));
}

function togglePreview() {
  const panel = document.getElementById('previewPanel');
  panel.classList.toggle('open');
}

async function savePost(publish) {
  const title = document.getElementById('writeTitle').value.trim();
  const content = easyMDE ? easyMDE.value().trim() : '';
  const tags = document.getElementById('writeTags').value.split(',').map(t => t.trim()).filter(Boolean);
  const excerpt = document.getElementById('writeExcerpt').value.trim();

  if (!title) { showToast('标题不能为空', 'error'); return; }
  if (!content) { showToast('内容不能为空', 'error'); return; }

  const payload = {
    title, content, excerpt, tags,
    author_id: window._currentUser.id,
    published: publish
  };

  const btn = publish ? document.getElementById('publishBtn') : document.getElementById('saveDraftBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    if (editingId) {
      await dbUpdate('posts', payload, 'id', editingId);
    } else {
      await dbInsert('posts', payload);
    }
    clearDraft();
    isDirty = false;
    showToast(publish ? '文章已发布！' : '草稿已保存');
    if (publish && !editingId) {
      // Redirect to home after publishing new post
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    }
  } catch(e) {
    showToast('保存失败: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = publish ? (editingId ? '更新' : '发布') : '存草稿';
  }
}

function showToast(msg, type) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:999;padding:12px 20px;border-radius:8px;font-size:.82rem;font-family:var(--font);box-shadow:0 4px 16px rgba(0,0,0,.12);transition:all .3s ease;transform:translateX(120%);opacity:0';
  el.style.background = type === 'error' ? '#fef2f2' : '#fff';
  el.style.color = type === 'error' ? '#dc2626' : '#2c2c2c';
  el.style.border = '1px solid ' + (type === 'error' ? '#fecaca' : '#e8e5e0');
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.transform = 'translateX(0)'; el.style.opacity = '1'; });
  setTimeout(() => { el.style.transform = 'translateX(120%)'; el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
}
</script>
</body>
</html>
