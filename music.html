<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>N1tyN1ne ┬Ę ķ¤│õ╣É</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>ŌÖ?/text></svg>">
  <style>
    /* ŌöĆŌöĆŌöĆ Browse Layout ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    .browse-view{display:flex;flex-direction:column;min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom, 0px))}
    .browse-nav{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      padding:12px 24px;background:var(--bg);border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:20;backdrop-filter:blur(16px);
    }
    .browse-nav .logo{font-size:.95rem;font-weight:800;color:var(--text-bright);white-space:nowrap}
    .browse-nav .home-link{font-size:.78rem;color:var(--text-dim);text-decoration:none;font-weight:500;white-space:nowrap;transition:color .2s}
    .browse-nav .home-link:hover{color:var(--warm)}

    .browse-tabs{display:flex;gap:4px;background:var(--bg-muted);padding:4px;border-radius:var(--radius-sm);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}.browse-tabs::-webkit-scrollbar{display:none}
    .browse-tabs button{
      padding:7px 16px;border:none;background:transparent;color:var(--text-dim);
      font-size:.8rem;font-weight:600;cursor:pointer;border-radius:calc(var(--radius-sm) - 2px);
      transition:all .2s;white-space:nowrap;font-family:inherit;
    }
    .browse-tabs button:hover{color:var(--text-bright)}
    .browse-tabs button.active{background:var(--bg);color:var(--warm);box-shadow:0 1px 3px rgba(0,0,0,.06)}

    .browse-main{flex:1;padding:24px;max-width:1100px;width:100%;margin:0 auto}

    /* ŌöĆŌöĆŌöĆ Song List ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    .song-list{display:flex;flex-direction:column}
    .song-row{
      display:grid;grid-template-columns:40px 48px 1fr 1fr 100px 80px;
      align-items:center;gap:12px;padding:10px 16px;border-radius:var(--radius-sm);
      cursor:pointer;transition:all .15s;border:1px solid transparent;
    }
    .song-row:hover{background:var(--bg-muted);border-color:var(--border)}
    .song-row.playing{background:var(--warm-light);border-color:var(--warm)}
    .song-row .sr-num{font-size:.75rem;color:var(--text-dim);text-align:center}
    .song-row.playing .sr-num{color:var(--warm);font-weight:700}
    .song-row .sr-cover{
      width:36px;height:36px;border-radius:6px;object-fit:cover;background:var(--bg-muted);
    }
    .song-row .sr-title{font-weight:600;font-size:.85rem;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .song-row.playing .sr-title{color:var(--warm)}
    .song-row .sr-artist{font-size:.78rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .song-row .sr-album{font-size:.75rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .song-row .sr-dur{font-size:.75rem;color:var(--text-dim);text-align:right}
    .sr-song-info{display:flex;flex-direction:column;min-width:0}
    .sr-song-info .sr-artist{font-size:.72rem}

    @media(max-width:768px){
      .song-row{grid-template-columns:28px 36px 1fr 60px}
      .song-row .sr-album{display:none}
      .browse-nav{padding:10px 16px;flex-wrap:wrap;gap:8px}
      .browse-main{padding:16px}
    }
    @media(max-width:480px){
      .song-row{grid-template-columns:24px 32px 1fr 50px;gap:8px;padding:8px 12px}
      .browse-tabs button{padding:6px 12px;font-size:.75rem}
    }

    /* ŌöĆŌöĆŌöĆ Cards Grid (Genre / Album) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    .cards-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;
    }
    .genre-card,.album-card{
      background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);
      padding:24px 20px;text-align:center;cursor:pointer;transition:all .2s;
      display:flex;flex-direction:column;align-items:center;gap:10px;
    }
    .genre-card:hover,.album-card:hover{
      border-color:var(--warm);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06);
    }
    .genre-card .gc-icon{
      width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:1.4rem;background:var(--warm-light);color:var(--warm-dark);
    }
    .genre-card .gc-name{font-weight:700;font-size:.9rem;color:var(--text-bright)}
    .genre-card .gc-count{font-size:.72rem;color:var(--text-dim)}

    .album-card{padding:0;text-align:left;gap:0;overflow:hidden}
    .album-card .ac-cover{
      width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg-muted);
      display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:2rem;
    }
    .album-card .ac-info{padding:14px 16px;width:100%}
    .album-card .ac-name{font-weight:700;font-size:.85rem;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .album-card .ac-meta{font-size:.72rem;color:var(--text-dim);margin-top:3px}
    .album-card .ac-desc{font-size:.7rem;color:var(--text-dim);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    @media(max-width:768px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}}
    @media(max-width:480px){.cards-grid{grid-template-columns:repeat(2,1fr);gap:10px}}

    /* ŌöĆŌöĆŌöĆ Album Detail ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    .album-hero{
      display:flex;gap:28px;align-items:flex-start;margin-bottom:32px;
      padding:28px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border);
    }
    .album-hero .ah-cover{
      width:200px;height:200px;border-radius:var(--radius);object-fit:cover;flex-shrink:0;
      background:var(--bg-muted);box-shadow:0 8px 32px rgba(0,0,0,.1);
    }
    .album-hero .ah-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:8px}
    .album-hero .ah-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--warm)}
    .album-hero .ah-name{font-size:1.6rem;font-weight:900;color:var(--text-bright)}
    .album-hero .ah-meta{font-size:.82rem;color:var(--text-dim)}
    .album-hero .ah-desc{font-size:.82rem;color:var(--text);line-height:1.6;margin-top:4px}
    .btn-play-all{
      display:inline-flex;align-items:center;gap:8px;padding:10px 24px;
      background:var(--warm);color:#fff;border:none;border-radius:99px;
      font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;
      align-self:flex-start;
    }
    .btn-play-all:hover{background:var(--warm-dark);transform:scale(1.03);box-shadow:0 4px 16px var(--warm-glow)}

    @media(max-width:768px){
      .album-hero{flex-direction:column;align-items:center;text-align:center;padding:20px;gap:16px}
      .album-hero .ah-cover{width:160px;height:160px}
      .album-hero .ah-name{font-size:1.3rem}
      .btn-play-all{align-self:center}
    }
    @media(max-width:480px){
      .album-hero .ah-cover{width:130px;height:130px}
      .album-hero .ah-name{font-size:1.1rem}
    }

    /* ŌöĆŌöĆŌöĆ Pagination ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    .pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:28px 0 20px}
    .pagination button{
      min-width:36px;height:36px;border:1.5px solid var(--border);background:var(--bg);
      color:var(--text);border-radius:var(--radius-xs);cursor:pointer;font-size:.8rem;
      font-weight:600;transition:all .15s;font-family:inherit;padding:0 8px;
    }
    .pagination button:hover:not(:disabled){border-color:var(--warm);color:var(--warm)}
    .pagination button.active{background:var(--warm);color:#fff;border-color:var(--warm)}
    .pagination button:disabled{opacity:.3;cursor:default}
    .pagination .pg-ellipsis{color:var(--text-dim);font-size:.8rem;padding:0 4px}

    /* ŌöĆŌöĆŌöĆ Now Playing View ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    .player-view{
      display:none;position:fixed;inset:0;z-index:50;background:#0f0f0f;
      grid-template-rows:56px 1fr;grid-template-areas:'nav''main';
    }
    .player-view.open{display:grid}
    .player-nav{
      grid-area:nav;display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;background:rgba(15,15,15,.9);border-bottom:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(20px);z-index:10;
    }
    .player-nav .pn-back{
      background:none;border:none;color:#888;font-size:.82rem;font-weight:600;
      cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:color .2s;
    }
    .player-nav .pn-back:hover{color:#f0ede4}
    .player-nav .pn-title{font-size:.88rem;font-weight:700;color:#f0ede4}

    .player-main{
      grid-area:main;position:relative;overflow:hidden;
      display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr auto;
      grid-template-areas:'cover lyrics''playlist playlist';
    }
    .bg-blur{position:absolute;inset:0;z-index:0;overflow:hidden}
    .bg-blur img{width:120%;height:120%;object-fit:cover;filter:blur(100px) brightness(.2) saturate(.5);transform:scale(1.1)}
    .bg-overlay{position:absolute;inset:0;background:rgba(15,15,15,.6);z-index:1}

    .cover-panel{
      grid-area:cover;position:relative;z-index:2;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:0 40px;gap:20px;
    }
    .cover-card{
      width:clamp(200px,24vw,300px);height:clamp(200px,24vw,300px);
      border-radius:18px;position:relative;cursor:pointer;
      transform-style:preserve-3d;transition:transform .15s ease-out,box-shadow .3s ease;
      box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);
      will-change:transform;
    }
    .cover-card img{width:100%;height:100%;object-fit:cover;display:block;border-radius:18px}
    .cover-card .tilt-gloss{
      position:absolute;inset:0;border-radius:18px;pointer-events:none;transition:background .15s ease;z-index:2;
    }
    .cover-card .card-shine{
      position:absolute;inset:0;border-radius:18px;pointer-events:none;z-index:1;
      background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%,rgba(255,255,255,.03) 100%);
    }
    .cover-card.playing::before{
      content:'';position:absolute;inset:-4px;border-radius:22px;z-index:-1;
      background:linear-gradient(45deg,var(--accent),var(--accent-light),#c4a35a,var(--accent-light),var(--accent));
      background-size:300% 300%;animation:border-glow 3s ease infinite;opacity:.6;
    }
    @keyframes border-glow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

    .track-info{text-align:center}
    .track-info .t-title{font-size:1.2rem;font-weight:800;color:#f0ede4;margin-bottom:4px}
    .track-info .t-artist{font-size:.84rem;color:#888}

    .player-ctrls{display:flex;align-items:center;gap:12px}
    .player-ctrls button{background:none;border:none;color:#888;cursor:pointer;font-size:1rem;transition:all .15s;padding:6px;line-height:1}
    .player-ctrls button:hover{color:#f0ede4;transform:scale(1.08)}
    .player-ctrls .btn-play{
      width:48px;height:48px;background:var(--accent);color:#fff;font-size:1.1rem;
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      transition:all .2s ease;box-shadow:0 4px 20px var(--accent-glow);
    }
    .player-ctrls .btn-play:hover{background:var(--accent-light);transform:scale(1.06);color:#fff}
    .player-ctrls .active-ctrl{color:var(--accent-light)!important}

    .progress-wrap{width:100%;max-width:340px;display:flex;align-items:center;gap:10px;font-size:.68rem;color:#888}
    .progress-wrap .bar{flex:1;height:3px;background:rgba(255,255,255,.08);border-radius:99px;cursor:pointer;position:relative;overflow:visible}
    .progress-wrap .bar .fill{height:100%;background:var(--accent);border-radius:99px;transition:width .15s linear}
    .progress-wrap .bar .dot{
      position:absolute;top:50%;left:0;transform:translate(-50%,-50%);
      width:12px;height:12px;background:var(--accent-light);border-radius:50%;
      opacity:0;transition:opacity .15s;pointer-events:none;box-shadow:0 0 12px rgba(138,171,122,.5);
    }
    .progress-wrap .bar:hover .dot{opacity:1}
    .vol-wrap{display:flex;align-items:center;gap:6px;font-size:.7rem;color:#888}
    .vol-wrap input[type=range]{width:70px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.08);outline:none;border-radius:99px}
    .vol-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer}

    .lyrics-panel{
      grid-area:lyrics;position:relative;z-index:2;
      overflow-y:auto;overflow-x:hidden;padding:calc(50vh - 80px) 20px;
      display:flex;flex-direction:column;align-items:center;gap:4px;
      scroll-behavior:smooth;
      -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 8%,black 92%,transparent 100%);
      mask-image:linear-gradient(to bottom,transparent 0%,black 8%,black 92%,transparent 100%);
    }
    .lyrics-panel .lyric-line{
      font-size:.88rem;color:rgba(255,255,255,.25);padding:12px 24px;
      transition:all .5s cubic-bezier(.25,.1,.25,1);text-align:center;
      cursor:pointer;border-radius:12px;font-weight:400;line-height:1.5;
      letter-spacing:.3px;transform:scale(.9);
    }
    .lyrics-panel .lyric-line.active{
      color:#f0ede4;font-size:1.15rem;font-weight:700;transform:scale(1);letter-spacing:.5px;
      text-shadow:0 0 30px rgba(240,237,228,.1);
    }
    .lyrics-panel .lyric-line.past{color:rgba(255,255,255,.4);transform:scale(.92)}
    .lyrics-panel .no-lyrics{color:#555;font-size:.9rem;text-align:center;transform:scale(1)}

    .playlist-drawer{
      grid-area:playlist;position:relative;z-index:2;
      background:rgba(15,15,15,.85);border-top:1px solid rgba(255,255,255,.06);
      backdrop-filter:blur(20px);max-height:210px;overflow-y:auto;transition:max-height .35s ease;
    }
    .playlist-drawer.collapsed{max-height:0;border-top:none}
    .playlist-drawer .pl-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 28px;position:sticky;top:0;background:rgba(15,15,15,.9);
      z-index:2;border-bottom:1px solid rgba(255,255,255,.05);
    }
    .playlist-drawer .pl-header span{font-size:.7rem;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:2px}
    .playlist-drawer .pl-header button{background:none;border:none;color:#666;cursor:pointer;font-size:.9rem;transition:.15s}
    .playlist-drawer .pl-header button:hover{color:#f0ede4}
    .pl-track{
      display:flex;align-items:center;gap:12px;padding:9px 28px;cursor:pointer;
      transition:all .15s;border-left:3px solid transparent;
    }
    .pl-track:hover{background:rgba(255,255,255,.02)}
    .pl-track.active{background:rgba(107,142,90,.12);border-left-color:var(--accent)}
    .pl-track .pl-num{width:20px;text-align:center;font-size:.7rem;color:#555;flex-shrink:0}
    .pl-track.active .pl-num{color:var(--accent-light);font-weight:700}
    .pl-track .pl-info{flex:1;min-width:0}
    .pl-track .pl-info .pl-t{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pl-track.active .pl-info .pl-t{color:var(--accent-light)}
    .pl-track .pl-info .pl-a{font-size:.7rem;color:#555}
    .pl-track .pl-dur{font-size:.7rem;color:#555;flex-shrink:0}

    @media(max-width:768px){
      .player-main{grid-template-columns:1fr;grid-template-rows:auto 1fr auto;grid-template-areas:'cover''lyrics''playlist'}
      .cover-panel{padding:16px;gap:12px}
      .cover-card{width:160px;height:160px}
      .track-info .t-title{font-size:1.05rem}
      .player-ctrls{gap:8px}
      .player-ctrls .btn-play{width:42px;height:42px}
      .progress-wrap{max-width:240px}
      .lyrics-panel{padding:30vh 12px 40vh}
      .lyrics-panel .lyric-line{font-size:.8rem;padding:10px 16px}
      .lyrics-panel .lyric-line.active{font-size:1rem}
      .pl-track{padding:8px 16px}
    }
    @media(max-width:480px){
      .cover-card{width:130px;height:130px}
      .lyrics-panel .lyric-line{font-size:.76rem}
    }

    /* ŌöĆŌöĆŌöĆ Empty State ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
    .empty-state i{font-size:2.5rem;display:block;margin-bottom:12px;opacity:.5}
    .empty-state p{font-size:.9rem;margin:0}

    /* ŌöĆŌöĆŌöĆ Toast ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
    .toast-container{position:fixed;bottom:24px;right:24px;z-index:100;display:flex;flex-direction:column;gap:8px}
    .toast{
      background:#1a1a1a;border:1px solid rgba(255,255,255,.1);padding:10px 18px;
      font-size:.78rem;transform:translateX(120%);opacity:0;transition:all .3s;
      max-width:300px;font-family:var(--font);border-radius:8px;
    }
    .toast.show{transform:translateX(0);opacity:1}
    .loading-skeleton{text-align:center;padding:60px 0;animation:skPulse 1.6s ease-in-out infinite} @keyframes skPulse{0%,100%{opacity:.4}50%{opacity:.8}} .loaded .loading-skeleton{display:none}\n  </style>
</head>
<body>

<script>
/* ŌöĆŌöĆŌöĆ Music Browse App ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const MusicApp = {
  allTracks: [],
  albumIndex: {},
  genreIndex: {},
  currentView: 'all',
  currentParam: '',
  currentPage: 1,
  pageSize: 12,
  _lastBrowseHash: 'all',

  async init() {
    Player.init();
    // Fetch all music
    try {
      const data = await dbSelect('music', { order: { col: 'created_at', dir: 'desc' } });
      this.allTracks = (data || []).reverse();
    } catch(e) {
      this.allTracks = [];
    }
    // Set player tracks
    Player.tracks = this.allTracks;
    Player._emit('playlist');
    Player._renderFloat();
    // Build indices
    this.buildIndices();
    // Restore player state
    const st = Player._getState();
    if (st && st.playing && st.idx >= 0 && st.idx < this.allTracks.length) {
      Player.idx = st.idx;
      Player.audio.src = https(this.allTracks[st.idx]?.audio_url || '');
      if (st.pos > 0) Player.audio.currentTime = st.pos;
      Player.audio.play().catch(() => {});
      Player._updateInfo();
      Player.parseLyrics(this.allTracks[st.idx]?.lyrics || '');
    }
    // Route
    document.getElementById("browseView").classList.add("loaded");\n    this.route();
    window.addEventListener('hashchange', () => this.route());
    // Tab clicks
    document.querySelectorAll('#browseTabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#browseTabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const v = btn.dataset.view;
        if (v === 'all') this.navigate('all');
        else if (v === 'genres') this.navigate('genres');
        else if (v === 'albums') this.navigate('albums');
      });
    });
    // Player events
    Player.on('playlist', () => this._highlightPlaying());
    Player.on('track', () => this._highlightPlaying());
  },

  buildIndices() {
    this.albumIndex = {};
    this.genreIndex = {};
    for (const t of this.allTracks) {
      // Album index
      const album = (t.album || '').trim();
      if (album) {
        if (!this.albumIndex[album]) this.albumIndex[album] = { tracks: [], cover: '', description: '', genre: '' };
        this.albumIndex[album].tracks.push(t);
        if (!this.albumIndex[album].cover && t.cover_url) this.albumIndex[album].cover = t.cover_url;
        if (!this.albumIndex[album].description && t.album_description) this.albumIndex[album].description = t.album_description;
        if (!this.albumIndex[album].genre && t.genre) this.albumIndex[album].genre = t.genre;
      }
      // Genre index
      const genre = (t.genre || '').trim();
      if (genre) {
        if (!this.genreIndex[genre]) this.genreIndex[genre] = [];
        this.genreIndex[genre].push(t);
      }
    }
  },

  /* ŌöĆŌöĆŌöĆ Routing ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  route() {
    const hash = window.location.hash.replace('#', '') || 'all';
    if (hash === 'playing') { this.showPlayer(); return; }
    this.showBrowse();
    // Parse hash
    const pageMatch = hash.match(/^all&page=(\d+)$/);
    if (pageMatch) { this.currentView = 'all'; this.currentPage = parseInt(pageMatch[1]) || 1; this.render(); return; }
    if (hash === 'all') { this.currentView = 'all'; this.currentPage = 1; this.render(); return; }
    if (hash === 'genres') { this.currentView = 'genres'; this.render(); return; }
    if (hash === 'albums') { this.currentView = 'albums'; this.render(); return; }
    const albumMatch = hash.match(/^album\/(.+)$/);
    if (albumMatch) {
      this.currentView = 'album';
      this.currentParam = decodeURIComponent(albumMatch[1]);
      document.querySelectorAll('#browseTabs button').forEach(b => { b.classList.remove('active'); if (b.dataset.view === 'albums') b.classList.add('active'); });
      this.render();
      return;
    }
    const genreMatch = hash.match(/^genre\/(.+)$/);
    if (genreMatch) {
      this.currentView = 'genre';
      this.currentParam = decodeURIComponent(genreMatch[1]);
      document.querySelectorAll('#browseTabs button').forEach(b => { b.classList.remove('active'); if (b.dataset.view === 'genres') b.classList.add('active'); });
      this.render();
      return;
    }
    // Fallback
    this.navigate('all');
  },

  navigate(view, param) {
    if (view === 'all') window.location.hash = 'all';
    else if (view === 'genres') window.location.hash = 'genres';
    else if (view === 'albums') window.location.hash = 'albums';
    else if (view === 'album') window.location.hash = 'album/' + encodeURIComponent(param || '');
    else if (view === 'genre') window.location.hash = 'genre/' + encodeURIComponent(param || '');
  },

  setTab(view) {
    document.querySelectorAll('#browseTabs button').forEach(b => {
      b.classList.remove('active');
      if (b.dataset.view === view) b.classList.add('active');
    });
  },

  /* ŌöĆŌöĆŌöĆ Render ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  render() {
    switch(this.currentView) {
      case 'all': this.renderAllSongs(); break;
      case 'genres': this.renderGenres(); break;
      case 'albums': this.renderAlbums(); break;
      case 'album': this.renderAlbumDetail(this.currentParam); break;
      case 'genre': this.renderGenreDetail(this.currentParam); break;
    }
    this._highlightPlaying();
    window.scrollTo({ top: 0, behavior: 'instant' });
  },

  /* ŌöĆŌöĆŌöĆ All Songs ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  renderAllSongs() {
    this.setTab('all');
    const total = this.allTracks.length;
    const totalPages = Math.max(1, Math.ceil(total / this.pageSize));
    if (this.currentPage > totalPages) this.currentPage = totalPages;
    const start = (this.currentPage - 1) * this.pageSize;
    const page = this.allTracks.slice(start, start + this.pageSize);

    let html = '';
    if (!page.length) {
      html = '<div class="empty-state"><i class="fas fa-music"></i><p>µÜéµŚĀķ¤│õ╣É</p></div>';
    } else {
      html = '<div class="song-list">';
      page.forEach((t, i) => {
        const globalIdx = this.allTracks.indexOf(t);
        const isPlaying = Player.idx === globalIdx && Player.playing;
        html += '<div class="song-row' + (isPlaying ? ' playing' : '') + '" data-track="' + globalIdx + '" onclick="MusicApp.playTrack(' + globalIdx + ')">' +
          '<span class="sr-num">' + (isPlaying ? '<i class="fas fa-play" style="font-size:8px"></i>' : (start + i + 1)) + '</span>' +
          '<img class="sr-cover" src="' + https(t.cover_url || '') + '" onerror="this.style.display=\'none\'" alt="">' +
          '<div class="sr-song-info"><span class="sr-title">' + escHtml(t.title) + '</span><span class="sr-artist">' + escHtml(t.artist || '') + '</span></div>' +
          '<span class="sr-album">' + escHtml(t.album || 'ŌĆ?) + '</span>' +
          '<span class="sr-album">' + escHtml(t.genre || 'ŌĆ?) + '</span>' +
          '<span class="sr-dur">' + (t.duration || '') + '</span>' +
        '</div>';
      });
      html += '</div>';
    }
    document.getElementById('browseMain').innerHTML = html;
    this.renderPagination(totalPages);
  },

  /* ŌöĆŌöĆŌöĆ Genres Grid ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  renderGenres() {
    this.setTab('genres');
    const genres = Object.keys(this.genreIndex).sort((a, b) => this.genreIndex[b].length - this.genreIndex[a].length);
    if (!genres.length) {
      document.getElementById('browseMain').innerHTML = '<div class="empty-state"><i class="fas fa-tags"></i><p>µÜéµŚĀÕłåń▒╗</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    const icons = ['fa-guitar', 'fa-drum', 'fa-microphone', 'fa-record-vinyl', 'fa-headphones', 'fa-fire', 'fa-bolt', 'fa-star'];
    let html = '<div class="cards-grid">';
    genres.forEach((g, i) => {
      html += '<div class="genre-card" onclick="MusicApp.navigate(\'genre\',\'' + escAttr(g) + '\')">' +
        '<div class="gc-icon"><i class="fas ' + (icons[i % icons.length]) + '"></i></div>' +
        '<div class="gc-name">' + escHtml(g) + '</div>' +
        '<div class="gc-count">' + this.genreIndex[g].length + ' ķ”?/div>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('browseMain').innerHTML = html;
    document.getElementById('pagination').innerHTML = '';
  },

  /* ŌöĆŌöĆŌöĆ Albums Grid ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  renderAlbums() {
    this.setTab('albums');
    const albums = Object.keys(this.albumIndex).sort((a, b) => this.albumIndex[b].tracks.length - this.albumIndex[a].tracks.length);
    if (!albums.length) {
      document.getElementById('browseMain').innerHTML = '<div class="empty-state"><i class="fas fa-compact-disc"></i><p>µÜéµŚĀõĖōĶŠæ</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    let html = '<div class="cards-grid">';
    albums.forEach(a => {
      const info = this.albumIndex[a];
      html += '<div class="album-card" onclick="MusicApp.navigate(\'album\',\'' + escAttr(a) + '\')">' +
        (info.cover
          ? '<img class="ac-cover" src="' + https(info.cover) + '" alt="" loading="lazy">'
          : '<div class="ac-cover"><i class="fas fa-compact-disc"></i></div>') +
        '<div class="ac-info">' +
          '<div class="ac-name">' + escHtml(a) + '</div>' +
          '<div class="ac-meta">' + info.tracks.length + ' ķ”? + (info.genre ? ' ┬Ę ' + escHtml(info.genre) : '') + '</div>' +
          (info.description ? '<div class="ac-desc">' + escHtml(info.description) + '</div>' : '') +
        '</div>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('browseMain').innerHTML = html;
    document.getElementById('pagination').innerHTML = '';
  },

  /* ŌöĆŌöĆŌöĆ Album Detail ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  renderAlbumDetail(name) {
    const info = this.albumIndex[name];
    if (!info) {
      document.getElementById('browseMain').innerHTML = '<div class="empty-state"><i class="fas fa-question-circle"></i><p>õĖōĶŠæõĖŹÕŁśÕ£?/p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    let html = '<div class="album-hero">' +
      (info.cover
        ? '<img class="ah-cover" src="' + https(info.cover) + '" alt="">'
        : '<div class="ah-cover" style="display:flex;align-items:center;justify-content:center;background:var(--bg-muted)"><i class="fas fa-compact-disc" style="font-size:3rem;color:var(--text-dim)"></i></div>') +
      '<div class="ah-info">' +
        '<span class="ah-label">õĖōĶŠæ</span>' +
        '<h1 class="ah-name">' + escHtml(name) + '</h1>' +
        '<div class="ah-meta">' + info.tracks.length + ' ķ”? + (info.genre ? ' ┬Ę ' + escHtml(info.genre) : '') + '</div>' +
        (info.description ? '<p class="ah-desc">' + escHtml(info.description) + '</p>' : '') +
        '<button class="btn-play-all" onclick="MusicApp.playAlbum(\'' + escAttr(name) + '\')"><i class="fas fa-play"></i> µÆŁµöŠÕģ©ķā©</button>' +
      '</div>' +
    '</div>';

    html += '<div class="song-list">';
    info.tracks.forEach((t, i) => {
      const globalIdx = this.allTracks.indexOf(t);
      const isPlaying = Player.idx === globalIdx && Player.playing;
      html += '<div class="song-row' + (isPlaying ? ' playing' : '') + '" data-track="' + globalIdx + '" onclick="MusicApp.playAlbumTrack(\'' + escAttr(name) + '\',' + i + ')">' +
        '<span class="sr-num">' + (isPlaying ? '<i class="fas fa-play" style="font-size:8px"></i>' : (i + 1)) + '</span>' +
        '<img class="sr-cover" src="' + https(t.cover_url || info.cover || '') + '" onerror="this.style.display=\'none\'" alt="">' +
        '<div class="sr-song-info"><span class="sr-title">' + escHtml(t.title) + '</span><span class="sr-artist">' + escHtml(t.artist || '') + '</span></div>' +
        '<span class="sr-album"></span>' +
        '<span class="sr-album"></span>' +
        '<span class="sr-dur">' + (t.duration || '') + '</span>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('browseMain').innerHTML = html;
    document.getElementById('pagination').innerHTML = '';
  },

  /* ŌöĆŌöĆŌöĆ Genre Detail ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  renderGenreDetail(name) {
    const tracks = this.genreIndex[name];
    if (!tracks || !tracks.length) {
      document.getElementById('browseMain').innerHTML = '<div class="empty-state"><i class="fas fa-question-circle"></i><p>Õłåń▒╗õĖŹÕŁśÕ£©µł¢µÜéµŚĀµŁīµø▓</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    let html = '<div style="margin-bottom:24px">' +
      '<h1 style="font-size:1.5rem;font-weight:900;color:var(--text-bright);margin:0 0 6px">' + escHtml(name) + '</h1>' +
      '<p style="color:var(--text-dim);font-size:.85rem;margin:0">' + tracks.length + ' ķ”¢µŁīµø?/p>' +
      '<button class="btn-play-all" style="margin-top:12px" onclick="MusicApp.playGenre(\'' + escAttr(name) + '\')"><i class="fas fa-play"></i> µÆŁµöŠÕģ©ķā©</button>' +
    '</div>';

    html += '<div class="song-list">';
    tracks.forEach((t, i) => {
      const globalIdx = this.allTracks.indexOf(t);
      const isPlaying = Player.idx === globalIdx && Player.playing;
      html += '<div class="song-row' + (isPlaying ? ' playing' : '') + '" data-track="' + globalIdx + '" onclick="MusicApp.playGenreTrack(\'' + escAttr(name) + '\',' + i + ')">' +
        '<span class="sr-num">' + (isPlaying ? '<i class="fas fa-play" style="font-size:8px"></i>' : (i + 1)) + '</span>' +
        '<img class="sr-cover" src="' + https(t.cover_url || '') + '" onerror="this.style.display=\'none\'" alt="">' +
        '<div class="sr-song-info"><span class="sr-title">' + escHtml(t.title) + '</span><span class="sr-artist">' + escHtml(t.artist || '') + '</span></div>' +
        '<span class="sr-album">' + escHtml(t.album || 'ŌĆ?) + '</span>' +
        '<span class="sr-album"></span>' +
        '<span class="sr-dur">' + (t.duration || '') + '</span>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('browseMain').innerHTML = html;
    document.getElementById('pagination').innerHTML = '';
  },

  /* ŌöĆŌöĆŌöĆ Pagination ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  renderPagination(totalPages) {
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    const cp = this.currentPage;
    let btns = '';
    // Prev
    btns += '<button ' + (cp <= 1 ? 'disabled' : 'onclick="MusicApp.goPage(' + (cp - 1) + ')"') + '><i class="fas fa-chevron-left"></i></button>';
    // Pages
    const range = [];
    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) range.push(i);
    } else {
      range.push(1);
      if (cp > 3) range.push('...');
      for (let i = Math.max(2, cp - 1); i <= Math.min(totalPages - 1, cp + 1); i++) range.push(i);
      if (cp < totalPages - 2) range.push('...');
      range.push(totalPages);
    }
    range.forEach(p => {
      if (p === '...') btns += '<span class="pg-ellipsis">...</span>';
      else btns += '<button class="' + (p === cp ? 'active' : '') + '" onclick="MusicApp.goPage(' + p + ')">' + p + '</button>';
    });
    // Next
    btns += '<button ' + (cp >= totalPages ? 'disabled' : 'onclick="MusicApp.goPage(' + (cp + 1) + ')"') + '><i class="fas fa-chevron-right"></i></button>';
    document.getElementById('pagination').innerHTML = btns;
  },

  goPage(p) {
    this.currentPage = p;
    if (this.currentView === 'all') {
      window.location.hash = 'all&page=' + p;
    }
  },

  /* ŌöĆŌöĆŌöĆ Playback ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  playTrack(idx) {
    Player.play(idx);
  },

  playAlbum(albumName) {
    const info = this.albumIndex[albumName];
    if (!info || !info.tracks.length) return;
    Player.tracks = info.tracks;
    Player._emit('playlist');
    Player.play(0);
  },

  playAlbumTrack(albumName, idx) {
    const info = this.albumIndex[albumName];
    if (!info || !info.tracks.length) return;
    Player.tracks = info.tracks;
    Player._emit('playlist');
    Player.play(idx);
  },

  playGenre(genreName) {
    const tracks = this.genreIndex[genreName];
    if (!tracks || !tracks.length) return;
    Player.tracks = tracks;
    Player._emit('playlist');
    Player.play(0);
  },

  playGenreTrack(genreName, idx) {
    const tracks = this.genreIndex[genreName];
    if (!tracks || !tracks.length) return;
    Player.tracks = tracks;
    Player._emit('playlist');
    Player.play(idx);
  },

  /* ŌöĆŌöĆŌöĆ View Switching ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  showPlayer() {
    // Save current browse hash before entering player mode
    var h = window.location.hash.replace('#', '') || 'all';
    if (h !== 'playing') this._lastBrowseHash = h;
    document.getElementById('browseView').style.display = 'none';
    document.getElementById('playerView').classList.add('open');
    document.getElementById('floatPlayer').classList.remove('show');
    // Use replaceState to avoid triggering hashchange
    if (window.location.hash !== '#playing') {
      history.replaceState(null, '', '#playing');
    }
    var t = Player.tracks[Player.idx];
    document.getElementById('pnTitle').textContent = t ? (t.title + ' ┬Ę ' + t.artist) : 'µŁŻÕ£©µÆŁµöŠ';
  },

  showBrowse() {
    document.getElementById('browseView').style.display = '';
    document.getElementById('playerView').classList.remove('open');
    // Restore previous browse hash without triggering hashchange
    history.replaceState(null, '', '#' + this._lastBrowseHash);
    document.getElementById("browseView").classList.add("loaded");\n    this.route();
    Player._renderFloat();
  },

  /* ŌöĆŌöĆŌöĆ Highlight playing track ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
  _highlightPlaying() {
    document.querySelectorAll('.song-row').forEach(function(row) {
      row.classList.remove('playing');
      var idx = parseInt(row.dataset.track);
      if (idx === Player.idx && Player.playing) row.classList.add('playing');
    });
    // Update song row numbers when playing state changes
    document.querySelectorAll('.song-row .sr-num').forEach(function(el) {
      var row = el.closest('.song-row');
      if (!row) return;
      var idx = parseInt(row.dataset.track);
      if (idx === Player.idx && Player.playing) {
        el.innerHTML = '<i class="fas fa-play" style="font-size:8px"></i>';
      }
    });
  }
};

/* ŌöĆŌöĆŌöĆ App UI helpers ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
const AppUI = {
  playlistOpen: true,
  togglePlaylist() {
    this.playlistOpen = !this.playlistOpen;
    document.getElementById('playlistDrawer').classList.toggle('collapsed', !this.playlistOpen);
  }
};

/* ŌöĆŌöĆŌöĆ Escaper ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
var _escDiv;
function escHtml(str) {
  if (!_escDiv) _escDiv = document.createElement('div');
  _escDiv.textContent = str || '';
  return _escDiv.innerHTML;
}
function escAttr(str) {
  return (str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

/* ŌöĆŌöĆŌöĆ Boot ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
document.addEventListener('DOMContentLoaded', async () => {
  await MusicApp.init();

  // ŌöĆŌöĆŌöĆ Player event bindings ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  Player.on('play', () => {
    document.getElementById('btnPlay').innerHTML = '<i class="fas fa-pause"></i>';
    document.getElementById('coverCard').classList.add('playing');
    document.getElementById('btnShuffle').classList.toggle('active-ctrl', Player.shuffle);
    document.getElementById('btnRepeat').classList.toggle('active-ctrl', Player.repeat);
  });

  Player.on('pause', () => {
    document.getElementById('btnPlay').innerHTML = '<i class="fas fa-play"></i>';
    document.getElementById('coverCard').classList.remove('playing');
  });

  Player.on('track', (t) => {
    document.getElementById('muTitle').textContent = t.title || 'µ£¬ķĆēµŗ®';
    document.getElementById('muArtist').textContent = t.artist || 'ŌĆ?;
    document.getElementById('pnTitle').textContent = (t.title || '') + ' ┬Ę ' + (t.artist || '');
    const coverUrl = t.cover_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%231a1a1a" width="200" height="200"/><text x="100" y="115" text-anchor="middle" font-size="50" fill="%236b8e5a">ŌÖ?/text></svg>';
    const safeUrl = https(coverUrl);
    document.getElementById('coverImg').src = safeUrl;
    document.getElementById('bgImg').src = safeUrl;
  });

  Player.on('tick', ({ ct, dur, pct }) => {
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progDot').style.left = pct + '%';
    document.getElementById('curTime').textContent = Player.fmt(ct);
  });

  Player.on('durupdate', () => {
    document.getElementById('durTime').textContent = Player.fmt(Player.audio.duration);
  });

  Player.on('playlist', () => {
    renderPlaylist();
    document.getElementById('btnShuffle').classList.toggle('active-ctrl', Player.shuffle);
    document.getElementById('btnRepeat').classList.toggle('active-ctrl', Player.repeat);
  });

  Player.on('lyrics', (lyrics) => {
    const panel = document.getElementById('lyricsPanel');
    panel.querySelectorAll('.lyric-line').forEach(l => l.remove());
    const noEl = document.getElementById('noLyrics');
    if (noEl) noEl.style.display = lyrics.length ? 'none' : '';
    lyrics.forEach((l, i) => {
      const el = document.createElement('div');
      el.className = 'lyric-line';
      el.dataset.idx = i;
      el.dataset.time = l.time;
      el.textContent = l.text;
      el.onclick = () => { Player.audio.currentTime = l.time; };
      panel.appendChild(el);
    });
  });

  Player.on('lyricsync', (activeIdx) => {
    const lines = document.querySelectorAll('#lyricsPanel .lyric-line');
    lines.forEach((l, i) => {
      l.classList.remove('active', 'past');
      if (i === activeIdx) l.classList.add('active');
      else if (i < activeIdx) l.classList.add('past');
    });
    if (activeIdx >= 0 && lines[activeIdx]) {
      lines[activeIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  });

  // ŌöĆŌöĆŌöĆ Playlist rendering ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  function renderPlaylist() {
    const el = document.getElementById('plTracks');
    const count = document.getElementById('plCount');
    el.innerHTML = '';
    count.textContent = Player.tracks.length;
    if (!Player.tracks.length) {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:#555;font-size:.82rem">µÆŁµöŠÕłŚĶĪ©õĖ║ń®║</div>';
      return;
    }
    Player.tracks.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'pl-track' + (i === Player.idx ? ' active' : '');
      div.innerHTML =
        '<div class="pl-num">' + (i === Player.idx && Player.playing ? '<i class="fas fa-play" style="font-size:7px"></i>' : (i + 1)) + '</div>' +
        '<div class="pl-info"><div class="pl-t">' + escHtml(t.title || 'µ£¬ń¤ź') + '</div><div class="pl-a">' + escHtml(t.artist || 'ŌĆ?) + '</div></div>' +
        '<div class="pl-dur">' + (t.duration || '--:--') + '</div>';
      div.onclick = () => { Player.play(i); };
      el.appendChild(div);
    });
  }

  // ŌöĆŌöĆŌöĆ 3D Tilt ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  Player.initTilt(document.getElementById('coverCard'));
  document.getElementById('volSlider').value = Player.audio.volume;

  // ŌöĆŌöĆŌöĆ Keyboard shortcuts ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case ' ': e.preventDefault(); Player.toggle(); break;
      case 'ArrowRight': e.preventDefault(); Player.audio.currentTime += 5; break;
      case 'ArrowLeft': e.preventDefault(); Player.audio.currentTime -= 5; break;
      case 'ArrowUp': e.preventDefault(); Player.setVolume(Math.min(1, Player.audio.volume + .05)); document.getElementById('volSlider').value = Player.audio.volume; break;
      case 'ArrowDown': e.preventDefault(); Player.setVolume(Math.max(0, Player.audio.volume - .05)); document.getElementById('volSlider').value = Player.audio.volume; break;
      case 'r': Player.toggleShuffle(); break;
      case 'l': Player.toggleRepeat(); break;
      case 'Escape':
        if (document.getElementById('playerView').classList.contains('open')) MusicApp.showBrowse();
        break;
    }
  });

  // ŌöĆŌöĆŌöĆ Toast ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  window.showToast = function(msg, type) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + (type || '');
    t.textContent = msg;
    c.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  };

  // ŌöĆŌöĆŌöĆ Float player click Ōå?show player ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
  document.getElementById('floatPlayer').addEventListener('click', function(e) {
    if (e.target.closest('button')) return;
    if (Player.tracks.length && Player.idx >= 0) MusicApp.showPlayer();
  });
});
</script>
