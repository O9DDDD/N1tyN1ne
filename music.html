<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>N1tyN1ne · 音乐</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>♪</text></svg>">
  <style>
    /* ─── Easing Tokens ──────────────────────────── */
    :root {
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-bounce: cubic-bezier(0.25, 1.2, 0.5, 1.1);
      /* Player theme tokens */
      --player-bg: #121212;
      --player-bg-alt: rgba(18,18,18,.92);
      --player-surface: rgba(255,255,255,.04);
      --player-border: rgba(255,255,255,.06);
      --player-text: #f0ede4;
      --player-text-dim: #999;
      --player-text-muted: #777;
    }
    [data-theme="dark"] {
      --player-bg: #0a0a0a;
      --player-bg-alt: rgba(10,10,10,.94);
      --player-surface: rgba(255,255,255,.03);
      --player-border: rgba(255,255,255,.04);
      --player-text: #e0d8cc;
      --player-text-dim: #888;
      --player-text-muted: #666;
    }

    /* ─── Browse Layout ──────────────────────────── */
    .browse-view{display:flex;flex-direction:column;min-height:100vh;padding-bottom:calc(88px + env(safe-area-inset-bottom, 0px))}
    .browse-nav{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      padding:12px 24px;background:var(--bg);border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:20;backdrop-filter:blur(16px);
    }
    .browse-nav .logo{font-size:.95rem;font-weight:800;color:var(--text-bright);white-space:nowrap}
    .browse-nav .home-link{
      font-size:.78rem;color:var(--text-dim);text-decoration:none;font-weight:500;
      white-space:nowrap;transition:color .25s var(--ease-out);padding:6px 10px;border-radius:8px;
    }
    .browse-nav .home-link:hover{color:var(--warm);background:var(--warm-glow)}

    /* ─── Tabs: Segmented Pill ────────────────────── */
    .browse-tabs{
      display:flex;gap:2px;background:var(--bg-muted);padding:4px;
      border-radius:99px;overflow-x:auto;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;flex-shrink:0;border:1px solid var(--border);
    }
    .browse-tabs::-webkit-scrollbar{display:none}
    .browse-tabs button{
      padding:8px 18px;border:none;background:transparent;color:var(--text-dim);
      font-size:.8rem;font-weight:600;cursor:pointer;border-radius:99px;
      transition:all .4s var(--ease-out);white-space:nowrap;font-family:inherit;
      position:relative;z-index:1;
    }
    .browse-tabs button:hover{color:var(--text-bright)}
    .browse-tabs button.active{
      background:var(--bg);color:var(--warm);
      box-shadow:0 1px 4px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04);
    }
    .browse-tabs button:active{transform:scale(.96)}

    /* ─── Song List ──────────────────────────────── */
    .song-list{display:flex;flex-direction:column}
    .song-row{
      display:grid;grid-template-columns:40px 48px 1fr 1fr 1fr 80px;
      align-items:center;gap:12px;padding:12px 16px;border-radius:12px;
      cursor:pointer;transition:background .2s var(--ease-out),border-color .2s var(--ease-out),transform .15s var(--ease-out);
      border:1px solid transparent;opacity:0;transform:translateY(12px);
      animation:rowEnter .55s var(--ease-out) forwards;
    }
    @keyframes rowEnter { to { opacity:1; transform:translateY(0); } }
    .song-row:hover{background:var(--bg-muted);border-color:var(--border);transform:translateX(4px)}
    .song-row:active{transform:scale(.985)!important;transition:transform .15s var(--ease-out)}
    .song-row.playing{background:var(--warm-light);border-color:var(--warm);transform:none}
    .song-row.playing:hover{transform:translateX(2px)}
    .song-row .sr-num{font-size:.75rem;color:var(--text-dim);text-align:center;transition:color .25s var(--ease-out)}
    .song-row.playing .sr-num{color:var(--warm);font-weight:700}
    .song-row.playing .sr-num i{animation:pulseIcon .8s ease-in-out infinite}
    @keyframes pulseIcon { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes spin { to { transform:rotate(360deg); } }
    .song-row .sr-cover{
      width:40px;height:40px;border-radius:8px;object-fit:cover;background:var(--bg-muted);
      transition:transform .3s var(--ease-spring),box-shadow .3s var(--ease-out);
    }
    .song-row:hover .sr-cover{transform:scale(1.08);box-shadow:0 4px 12px rgba(0,0,0,.08)}
    .song-row .sr-title{font-weight:600;font-size:.85rem;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .25s var(--ease-out)}
    .song-row.playing .sr-title{color:var(--warm)}
    .song-row .sr-artist{font-size:.78rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .song-row .sr-album{font-size:.75rem;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .song-row .sr-dur{font-size:.75rem;color:var(--text-dim);text-align:right;font-variant-numeric:tabular-nums}
    .sr-song-info{display:flex;flex-direction:column;min-width:0}
    .sr-song-info .sr-artist{font-size:.72rem}

    @media(max-width:768px){
      .song-row{grid-template-columns:28px 36px 1fr 60px}
      .song-row .sr-album{display:none}
      .browse-nav{padding:10px 16px;gap:6px}
      .browse-nav .logo{font-size:.85rem}
      .browse-tabs button{padding:7px 12px;font-size:.73rem}
      .browse-main{padding:12px}
    }
    @media(max-width:480px){
      .song-row{grid-template-columns:22px 30px 1fr 48px;gap:6px;padding:8px 10px}
      .song-row .sr-cover{width:30px;height:30px;border-radius:6px}
      .song-row .sr-title{font-size:.78rem}
      .song-row .sr-artist{font-size:.7rem}
      .browse-tabs button{padding:6px 10px;font-size:.7rem}
      .browse-nav{padding:8px 10px;gap:4px}
      .browse-nav .logo{font-size:.78rem}
      .browse-nav .home-link{font-size:.7rem}
    }

    /* ─── Cards Grid (Genre / Album) ─────────────── */
    .cards-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;
    }
    .cards-grid > * { opacity:0; transform:translateY(16px); animation:cardEnter .6s var(--ease-spring) forwards; }
    @keyframes cardEnter { to { opacity:1; transform:translateY(0); } }

    .artist-card{
      background:var(--bg);border:1.5px solid var(--border);border-radius:16px;
      padding:28px 20px 24px;text-align:center;cursor:pointer;
      transition:all .5s var(--ease-spring);
      display:flex;flex-direction:column;align-items:center;gap:12px;
    }
    .artist-card:hover{
      border-color:var(--warm);transform:translateY(-4px);
      box-shadow:0 12px 32px rgba(0,0,0,.08),0 0 0 1px var(--warm);
    }
    .artist-card:active{transform:scale(.96);transition:transform .1s var(--ease-out)}
    .artist-card .gc-name{font-weight:700;font-size:1rem;color:var(--text-bright)}
    .artist-card .gc-count{font-size:.75rem;color:var(--text-dim);margin-top:4px}

    .album-card{
      padding:0;text-align:left;gap:0;overflow:hidden;border-radius:16px;
      background:var(--bg);border:1.5px solid var(--border);cursor:pointer;
      transition:all .5s var(--ease-spring);
    }
    .album-card:hover{
      border-color:var(--warm);transform:translateY(-4px);
      box-shadow:0 12px 32px rgba(0,0,0,.08),0 0 0 1px var(--warm);
    }
    .album-card:active{transform:scale(.96);transition:transform .1s var(--ease-out)}
    .album-card .ac-cover{
      width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg-muted);
      display:flex;align-items:center;justify-content:center;color:var(--text-dim);
      font-size:2rem;transition:transform .5s var(--ease-out);
    }
    .album-card:hover .ac-cover{transform:scale(1.06)}
    .album-card .ac-info{padding:14px 16px;width:100%}
    .album-card .ac-name{font-weight:700;font-size:.85rem;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .album-card .ac-meta{font-size:.72rem;color:var(--text-dim);margin-top:4px}
    .album-card .ac-desc{font-size:.7rem;color:var(--text-dim);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    @media(max-width:768px){.cards-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}}
    @media(max-width:480px){.cards-grid{grid-template-columns:repeat(2,1fr);gap:10px}}

    /* ─── Album Detail ───────────────────────────── */
    .album-hero{
      display:flex;gap:28px;align-items:flex-start;margin-bottom:32px;
      padding:28px;background:var(--bg);border-radius:16px;border:1px solid var(--border);
      animation:heroEnter .4s var(--ease-out);
    }
    @keyframes heroEnter { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .album-hero .ah-cover{
      width:200px;height:200px;border-radius:16px;object-fit:cover;flex-shrink:0;
      background:var(--bg-muted);box-shadow:0 8px 32px rgba(0,0,0,.1);
      transition:transform .4s var(--ease-spring);
    }
    .album-hero .ah-cover:hover{transform:scale(1.03)}
    .album-hero .ah-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:8px}
    .album-hero .ah-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--warm)}
    .album-hero .ah-name{font-size:1.6rem;font-weight:900;color:var(--text-bright);line-height:1.2}
    .album-hero .ah-meta{font-size:.82rem;color:var(--text-dim)}
    .album-hero .ah-desc{font-size:.82rem;color:var(--text);line-height:1.7;margin-top:4px}
    .btn-play-all{
      display:inline-flex;align-items:center;gap:8px;padding:10px 24px;
      background:linear-gradient(135deg,var(--warm),var(--warm-dark));color:#fff;
      border:none;border-radius:99px;font-size:.85rem;font-weight:700;
      cursor:pointer;transition:all .45s var(--ease-spring);font-family:inherit;
      align-self:flex-start;box-shadow:0 2px 8px var(--warm-glow);
    }
    .btn-play-all:hover{transform:scale(1.04);box-shadow:0 6px 24px var(--warm-glow)}
    .btn-play-all:active{transform:scale(.96);transition:transform .1s var(--ease-out)}

    @media(max-width:768px){
      .album-hero{flex-direction:column;align-items:center;text-align:center;padding:20px;gap:16px}
      .album-hero .ah-cover{width:160px;height:160px}
      .album-hero .ah-name{font-size:1.3rem}
      .btn-play-all{align-self:center}
    }
    @media(max-width:480px){
      .album-hero .ah-cover{width:130px;height:130px}
      .album-hero .ah-name{font-size:1.1rem}
    }

    /* ─── Pagination ─────────────────────────────── */
    .pagination{display:flex;justify-content:center;align-items:center;gap:6px;padding:28px 0 20px}
    .pagination button{
      min-width:38px;height:38px;border:1.5px solid var(--border);background:var(--bg);
      color:var(--text);border-radius:99px;cursor:pointer;font-size:.8rem;
      font-weight:600;transition:all .35s var(--ease-out);font-family:inherit;padding:0 10px;
    }
    .pagination button:hover:not(:disabled){border-color:var(--warm);color:var(--warm);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.04)}
    .pagination button:active:not(:disabled){transform:scale(.93);transition:transform .1s var(--ease-out)}
    .pagination button.active{background:var(--warm);color:#fff;border-color:var(--warm);box-shadow:0 2px 8px var(--warm-glow)}
    .pagination button:disabled{opacity:.25;cursor:default}
    .pagination .pg-ellipsis{color:var(--text-dim);font-size:.8rem;padding:0 4px;user-select:none}

    /* ═══════════════════════════════════════════════════
       NOW PLAYING VIEW — Complete Redesign
       ═══════════════════════════════════════════════════ */
    .player-view{
      display:none;position:fixed;inset:0;z-index:50;background:var(--player-bg);
      grid-template-rows:56px 1fr;grid-template-areas:'nav''main';
    }
    .player-view.open{display:grid;animation:playerEnter .4s var(--ease-out)}
    @keyframes playerEnter { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }

    .player-nav{
      grid-area:nav;display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;background:var(--player-bg-alt);border-bottom:1px solid var(--player-border);
      backdrop-filter:blur(20px);z-index:10;
    }
    .player-nav .pn-back{
      background:none;border:none;color:var(--player-text-dim);font-size:.82rem;font-weight:600;
      cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;
      transition:color .25s var(--ease-out),transform .25s var(--ease-out);
      padding:6px 10px;border-radius:8px;
    }
    .player-nav .pn-back:hover{color:var(--player-text);transform:translateX(-2px)}
    .player-nav .pn-title{font-size:.88rem;font-weight:700;color:var(--player-text);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50vw}

    .player-main{
      grid-area:main;position:relative;overflow:hidden;
      display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr;
      grid-template-areas:'cover lyrics';
    }
    .bg-blur{position:absolute;inset:0;z-index:0;overflow:hidden}
    .bg-blur img{width:120%;height:120%;object-fit:cover;filter:blur(80px) brightness(.3) saturate(.7);transform:scale(1.1);transition:opacity .6s var(--ease-out)}
    .bg-overlay{position:absolute;inset:0;background:rgba(15,15,15,.3);z-index:1}

    /* ─── Cover Panel ─────────────────────────────── */
    .cover-panel{
      grid-area:cover;position:relative;z-index:2;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:0 32px;gap:16px;
    }
    /* Track switch animation container */
    .cover-stage{position:relative;width:clamp(200px,24vw,300px);height:clamp(200px,24vw,300px)}
    .cover-card{
      position:absolute;inset:0;border-radius:18px;overflow:hidden;
      transform-style:preserve-3d;
      box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);
      will-change:transform,opacity;
    }
    .cover-card img{width:100%;height:100%;object-fit:cover;display:block;border-radius:18px}
    .cover-card .tilt-gloss{
      position:absolute;inset:0;border-radius:18px;pointer-events:none;z-index:2;
    }
    .cover-card .card-shine{
      position:absolute;inset:0;border-radius:18px;pointer-events:none;z-index:1;
      background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 50%,rgba(255,255,255,.03) 100%);
    }
    .cover-card.playing::before{
      content:'';position:absolute;inset:-5px;border-radius:23px;z-index:-1;
      background:linear-gradient(45deg,var(--accent),var(--accent-light),#c4a35a,var(--accent-light),var(--accent));
      background-size:300% 300%;animation:border-glow 3s ease infinite;opacity:.5;
    }
    @keyframes border-glow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

    /* Track switch animation states */
    .cover-card.switch-out-next{animation:slideOutLeft .35s var(--ease-out) forwards}
    .cover-card.switch-in-next{animation:slideInRight .35s var(--ease-out) forwards}
    .cover-card.switch-out-prev{animation:slideOutRight .35s var(--ease-out) forwards}
    .cover-card.switch-in-prev{animation:slideInLeft .35s var(--ease-out) forwards}
    @keyframes slideOutLeft { to { transform:translateX(-110%); opacity:0; } }
    @keyframes slideInRight { from { transform:translateX(110%); opacity:0; } to { transform:translateX(0); opacity:1; } }
    @keyframes slideOutRight { to { transform:translateX(110%); opacity:0; } }
    @keyframes slideInLeft { from { transform:translateX(-110%); opacity:0; } to { transform:translateX(0); opacity:1; } }
    .cover-card.fade-out{animation:coverFadeOut .3s var(--ease-out) forwards}
    .cover-card.fade-in{animation:coverFadeIn .3s var(--ease-out) forwards}
    @keyframes coverFadeOut { to { opacity:0; transform:scale(.94); } }
    @keyframes coverFadeIn { from { opacity:0; transform:scale(1.04); } to { opacity:1; transform:scale(1); } }

    .track-info{text-align:center;min-height:48px}
    .track-info .t-title{
      font-size:1.15rem;font-weight:800;color:var(--player-text);margin-bottom:3px;
      transition:opacity .25s var(--ease-out),transform .3s var(--ease-out);
    }
    .track-info .t-artist{font-size:.82rem;color:var(--player-text-dim);transition:opacity .25s var(--ease-out)}
    .track-info.fading .t-title,
    .track-info.fading .t-artist{opacity:0;transform:translateY(-8px)}

    .player-ctrls{display:flex;align-items:center;gap:8px}
    .player-ctrls button{
      background:none;border:none;color:var(--player-text-muted);cursor:pointer;font-size:1rem;
      transition:all .25s var(--ease-out);padding:6px;line-height:1;border-radius:50%;
    }
    .player-ctrls button:hover{color:var(--player-text);transform:scale(1.12)}
    .player-ctrls button:active{transform:scale(.88);transition:transform .1s var(--ease-out)}
    .player-ctrls .btn-play{
      width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;
      font-size:1.15rem;border-radius:50%;display:flex;align-items:center;justify-content:center;
      transition:all .3s var(--ease-spring);box-shadow:0 4px 24px rgba(107,142,90,.35);
    }
    .player-ctrls .btn-play:hover{transform:scale(1.08);box-shadow:0 6px 32px rgba(107,142,90,.45)}
    .player-ctrls .btn-play:active{transform:scale(.92);transition:transform .1s var(--ease-out)}
    .player-ctrls .active-ctrl{color:var(--accent-light)!important;text-shadow:0 0 12px var(--accent-glow)}

    .progress-wrap{width:100%;max-width:340px;display:flex;align-items:center;gap:10px;font-size:.68rem;color:var(--player-text-muted)}
    .progress-wrap .bar{
      flex:1;height:20px;background:transparent;border-radius:99px;cursor:pointer;
      position:relative;overflow:visible;display:flex;align-items:center;
    }
    .progress-wrap .bar::before{
      content:'';position:absolute;left:0;right:0;height:5px;background:var(--player-surface);
      border-radius:99px;transition:height .2s var(--ease-out);
    }
    .progress-wrap .bar:hover::before{height:7px}
    .progress-wrap .bar .fill{
      position:absolute;left:0;height:5px;background:var(--accent);border-radius:99px;
      transition:height .2s var(--ease-out);pointer-events:none;z-index:1;
    }
    .progress-wrap .bar:hover .fill{height:7px}
    .progress-wrap .bar .dot{
      position:absolute;top:50%;left:0;transform:translate(-50%,-50%);
      width:16px;height:16px;background:#fff;border-radius:50%;z-index:2;
      opacity:0;transition:opacity .2s var(--ease-out);pointer-events:none;
      box-shadow:0 0 16px rgba(138,171,122,.6),0 2px 8px rgba(0,0,0,.3);
    }
    .progress-wrap .bar:hover .dot,
    .progress-wrap .bar.dragging .dot{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
    .vol-wrap{display:flex;align-items:center;gap:6px;font-size:.7rem;color:var(--player-text-muted)}
    .vol-wrap input[type=range]{width:70px;height:4px;-webkit-appearance:none;appearance:none;background:var(--player-surface);outline:none;border-radius:99px}
    .vol-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--accent);border-radius:50%;cursor:pointer;transition:transform .2s var(--ease-spring);box-shadow:0 2px 8px rgba(0,0,0,.3)}
    .vol-wrap input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}

    /* ─── Fan-Shaped Lyrics ────────────────────────── */
    .lyrics-panel{
      grid-area:lyrics;position:relative;z-index:2;
      overflow-y:auto;overflow-x:hidden;
      display:flex;flex-direction:column;align-items:center;
      padding:calc(50vh - 140px) 20px;
      -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 8%,black 92%,transparent 100%);
      mask-image:linear-gradient(to bottom,transparent 0%,black 8%,black 92%,transparent 100%);
      perspective:1000px;perspective-origin:center center;
      scroll-behavior:smooth;
    }
    .lyrics-panel .lyric-line{
      font-size:1.3rem;color:rgba(255,255,255,.16);padding:16px 32px;
      transition:transform .5s cubic-bezier(.25,.1,.25,1),opacity .5s ease;
      text-align:center;cursor:pointer;border-radius:14px;font-weight:400;line-height:1.8;
      letter-spacing:.3px;will-change:transform,opacity;
      transform-origin:center center;
    }
    .lyrics-panel .lyric-line:hover{color:rgba(255,255,255,.45)}
    .lyrics-panel .lyric-line.active{
      color:var(--player-text);font-size:1.9rem;font-weight:700;
      text-shadow:0 0 80px rgba(240,237,228,.2),0 0 160px rgba(196,148,107,.12);
      transform:translateZ(30px) scale(1);
    }
    .lyrics-panel .lyric-line.past{color:rgba(255,255,255,.28)}
    .lyrics-panel .no-lyrics{
      color:rgba(255,255,255,.2);font-size:1.1rem;text-align:center;
      transform:translateZ(0);padding:40px 0;
    }
    /* Fan transform applied via JS on each line's style attribute */


    /* ─── Playlist Toggle & Drawer ─────────────────── */
    .playlist-toggle{
      position:absolute;bottom:20px;right:20px;z-index:8;
      width:44px;height:44px;border-radius:50%;
      background:rgba(0,0,0,.5);border:1px solid var(--player-border);
      color:var(--player-text-dim);cursor:pointer;font-size:1.1rem;
      backdrop-filter:blur(12px);
      display:flex;align-items:center;justify-content:center;
      transition:all .3s var(--ease-spring);
    }
    .playlist-toggle:hover{background:rgba(0,0,0,.7);color:var(--player-text);transform:scale(1.08)}
    .playlist-toggle .pl-badge{
      position:absolute;top:-6px;right:-6px;
      background:var(--accent);color:#fff;font-size:.62rem;font-weight:700;
      width:20px;height:20px;border-radius:50%;display:flex;
      align-items:center;justify-content:center;
    }
    .playlist-drawer{
      position:absolute;bottom:0;left:0;right:0;z-index:7;
      background:var(--player-bg-alt);border-top:1px solid var(--player-border);
      backdrop-filter:blur(24px);max-height:0;overflow-y:auto;
      transition:max-height .45s var(--ease-spring);
    }
    .playlist-drawer.open{max-height:320px}
    .playlist-drawer .pl-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 24px;position:sticky;top:0;background:var(--player-bg-alt);
      z-index:2;border-bottom:1px solid var(--player-border);
    }
    .playlist-drawer .pl-header span{font-size:.7rem;font-weight:600;color:var(--player-text-muted);text-transform:uppercase;letter-spacing:2px}
    .playlist-drawer .pl-header button{
      background:none;border:none;color:var(--player-text-muted);cursor:pointer;font-size:.9rem;
      transition:all .25s;padding:4px 8px;border-radius:6px;
    }
    .playlist-drawer .pl-header button:hover{color:var(--player-text)}
    .pl-track{
      display:flex;align-items:center;gap:12px;padding:9px 24px;cursor:pointer;
      transition:all .2s var(--ease-out);border-left:3px solid transparent;
    }
    .pl-track:hover{background:var(--player-surface)}
    .pl-track:active{background:var(--player-border)}
    .pl-track.active{background:rgba(107,142,90,.12);border-left-color:var(--accent)}
    .pl-track .pl-num{width:20px;text-align:center;font-size:.7rem;color:var(--player-text-muted);flex-shrink:0}
    .pl-track.active .pl-num{color:var(--accent-light);font-weight:700}
    .pl-track .pl-info{flex:1;min-width:0}
    .pl-track .pl-info .pl-t{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pl-track.active .pl-info .pl-t{color:var(--accent-light)}
    .pl-track .pl-info .pl-a{font-size:.7rem;color:var(--player-text-dim)}
    .pl-track .pl-dur{font-size:.7rem;color:var(--player-text-muted);flex-shrink:0;font-variant-numeric:tabular-nums}


    /* ─── Responsive ───────────────────────────────── */
    @media(max-width:768px){
      .player-main{grid-template-columns:1fr;grid-template-rows:auto 1fr;grid-template-areas:'cover' 'lyrics'}
      .cover-panel{padding:10px 16px;gap:6px}
      .cover-stage{width:130px;height:130px}
      .track-info .t-title{font-size:.95rem}
      .track-info .t-artist{font-size:.75rem}
      .player-ctrls{gap:4px}
      .player-ctrls button{padding:4px}
      .player-ctrls .btn-play{width:42px;height:42px}
      .player-ctrls .btn-play i{font-size:1rem}
      .progress-wrap{max-width:200px}
      .vol-wrap input[type=range]{width:50px}
      .lyrics-panel{padding:16vh 12px 40vh}
      .lyrics-panel .lyric-line{font-size:1.05rem;padding:14px 20px}
      .lyrics-panel .lyric-line.active{font-size:1.5rem}
      .pl-track{padding:7px 16px}
      .playlist-toggle{bottom:16px;right:16px;width:38px;height:38px}
      .playlist-drawer.open{max-height:260px}
    }
    @media(max-width:480px){
      .cover-stage{width:110px;height:110px}
      .cover-panel{padding:8px 12px}
      .track-info .t-title{font-size:.85rem}
      .lyrics-panel{padding:14vh 8px 36vh}
      .lyrics-panel .lyric-line{font-size:.95rem;padding:12px 14px}
      .lyrics-panel .lyric-line.active{font-size:1.35rem}
      .progress-wrap{max-width:160px}
    }

    /* ─── Empty State ────────────────────────────── */
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);animation:emptyFadeUp .5s var(--ease-out)}
    @keyframes emptyFadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .empty-state i{font-size:2.5rem;display:block;margin-bottom:12px;opacity:.35}
    .empty-state p{font-size:.9rem;margin:0}

    /* ─── Loading ────────────────────────────────── */
    .loading-skeleton{text-align:center;padding:60px 0;animation:skPulse 1.6s ease-in-out infinite}
    @keyframes skPulse{0%,100%{opacity:.3}50%{opacity:.7}} .loaded .loading-skeleton{display:none}

    /* ─── Dark Mode ──────────────────────────────── */
    [data-theme="dark"] .browse-tabs { border-color: #35302b; background: #1c1a17; }
    [data-theme="dark"] .browse-tabs button { color: #6e6962; }
    [data-theme="dark"] .browse-tabs button:hover { color: #a09b92; }
    [data-theme="dark"] .browse-tabs button.active { background: #282520; color: #c4a070; box-shadow: 0 1px 3px rgba(0,0,0,.25), 0 0 0 1px rgba(180,140,90,.12); }
    [data-theme="dark"] .artist-card:hover,
    [data-theme="dark"] .album-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,.4), 0 0 0 1px rgba(180,140,90,.12); }
    [data-theme="dark"] .btn-play-all { background: linear-gradient(135deg, #a07848, #7a5430); box-shadow: 0 2px 12px rgba(150,110,60,.15); }
    [data-theme="dark"] .btn-play-all:hover { box-shadow: 0 6px 24px rgba(150,110,60,.22); }
    [data-theme="dark"] .pagination button.active { background: #a07848; border-color: #a07848; box-shadow: 0 2px 12px rgba(150,110,60,.15); }
    [data-theme="dark"] .pagination button:hover:not(:disabled) { box-shadow: 0 4px 12px rgba(0,0,0,.2); }
    [data-theme="dark"] .song-row:hover { background: rgba(255,255,255,.02); border-color: #35302b; }
    [data-theme="dark"] .song-row:hover .sr-cover { box-shadow: 0 4px 16px rgba(0,0,0,.4); }
    [data-theme="dark"] .song-row.playing { background: rgba(180,140,90,.06); border-color: rgba(180,140,90,.12); }
    [data-theme="dark"] .song-row.playing:hover { background: rgba(180,140,90,.1); }
    [data-theme="dark"] .album-hero .ah-cover { box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    [data-theme="dark"] .browse-nav .home-link:hover { background: rgba(255,255,255,.04); }
    [data-theme="dark"] .song-row .sr-cover { background: #252220; }
    [data-theme="dark"] .album-card .ac-cover { background: #252220; }
    [data-theme="dark"] .album-hero .ah-cover { background: #252220; }
    [data-theme="dark"] .empty-state i { opacity: .2; }
    [data-theme="dark"] .artist-card { background: #1c1a17; }
    [data-theme="dark"] .album-card { background: #1c1a17; }
  </style>
</head>
<body>

<!-- ═══ Browse View ═══════════════════════════════════ -->
<div class="browse-view" id="browseView">
  <nav class="browse-nav">
    <span class="logo">N1tyN1ne · 音乐</span>
    <div class="browse-tabs" id="browseTabs">
      <button data-view="all" class="active">所有歌曲</button>
      <button data-view="artists">歌手</button>
      <button data-view="albums">专辑</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="theme-toggle" onclick="Theme.toggle()" title="切换深色/浅色模式" id="themeToggle"><i class="fas fa-moon"></i></button>
      <a href="index.html" class="home-link"><i class="fas fa-arrow-left"></i> 返回主页</a>
    </div>
  </nav>
  <main class="browse-main" id="browseMain"><div class="loading-skeleton" id="browseLoading"><p style="text-align:center;color:var(--text-dim);padding:60px 0;font-size:.9rem">加载中...</p></div></main>
  <div class="pagination" id="pagination"></div>
</div>

<!-- ═══ Now Playing View ═══════════════════════════════ -->
<div class="player-view" id="playerView">
  <nav class="player-nav">
    <button class="pn-back" onclick="MusicApp.showBrowse()"><i class="fas fa-arrow-left"></i> 返回</button>
    <span class="pn-title" id="pnTitle">正在播放</span>
    <span></span>
  </nav>
  <div class="player-main" id="playerMain">
    <div class="bg-blur"><img id="bgImg" src="" alt=""><div class="bg-overlay"></div></div>

    <!-- Cover Panel -->
    <div class="cover-panel">
      <div class="cover-stage">
        <div class="cover-card" id="coverCardA">
          <img id="coverImgA" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect fill='%231a1a1a' width='200' height='200'/><text x='100' y='115' text-anchor='middle' font-size='50' fill='%236b8e5a'>♪</text></svg>" alt="">
          <div class="tilt-gloss"></div>
          <div class="card-shine"></div>
        </div>
        <div class="cover-card" id="coverCardB">
          <img id="coverImgB" src="" alt="">
          <div class="tilt-gloss"></div>
          <div class="card-shine"></div>
        </div>
      </div>
      <div class="track-info" id="trackInfo">
        <div class="t-title" id="muTitle">未选择歌曲</div>
        <div class="t-artist" id="muArtist">—</div>
      </div>
      <div class="player-ctrls">
        <button onclick="Player.prev()" title="上一首"><i class="fas fa-step-backward"></i></button>
        <button class="btn-play" onclick="Player.toggle()" id="btnPlay" title="播放/暂停"><i class="fas fa-play"></i></button>
        <button onclick="Player.next()" title="下一首"><i class="fas fa-step-forward"></i></button>
        <button id="btnShuffle" onclick="Player.toggleShuffle()" title="随机"><i class="fas fa-random"></i></button>
        <button id="btnRepeat" onclick="Player.toggleRepeat()" title="循环"><i class="fas fa-repeat"></i></button>
      </div>
      <div class="progress-wrap">
        <span id="curTime">0:00</span>
        <div class="bar" id="progBar" onclick="Player.seek(event)">
          <div class="fill" id="progFill"></div>
          <div class="dot" id="progDot"></div>
        </div>
        <span id="durTime">0:00</span>
      </div>
      <div class="vol-wrap">
        <i class="fas fa-volume-down"></i>
        <input type="range" min="0" max="1" step="0.01" id="volSlider" oninput="Player.setVolume(this.value)">
      </div>
    </div>

    <!-- Lyrics Panel -->
    <div class="lyrics-panel" id="lyricsPanel">
      <div class="no-lyrics" id="noLyrics">选择一首歌曲开始播放</div>
    </div>

    <!-- Playlist Toggle Button -->
    <button class="playlist-toggle" id="playlistToggle" onclick="MusicApp.togglePlaylist()">
      <i class="fas fa-list"></i>
      <span class="pl-badge" id="plBadge">0</span>
    </button>

    <!-- Playlist Drawer -->
    <div class="playlist-drawer" id="playlistDrawer">
      <div class="pl-header">
        <span>播放列表 (<span id="plCount">0</span>)</span>
        <button onclick="MusicApp.togglePlaylist()"><i class="fas fa-chevron-down"></i></button>
      </div>
      <div id="plTracks"></div>
    </div>
  </div>
</div>

<!-- ═══ Floating Player Bar ════════════════════════════ -->
<div class="float-player" id="floatPlayer">
  <img class="fp-cover" id="fpCover" src="" alt="">
  <div class="fp-info">
    <div class="fp-title" id="fpTitle">—</div>
    <div class="fp-lyric" id="fpLyric">—</div>
  </div>
  <div class="fp-ctrls">
    <button onclick="event.stopPropagation();Player.toggle()"><i class="fas fa-play" id="fpPlayIcon"></i></button>
    <button onclick="event.stopPropagation();Player.next()"><i class="fas fa-step-forward"></i></button>
  </div>
  <div class="fp-progress"><div class="fp-bar" id="fpBar"></div></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/theme.js?v=2"></script>
<script src="js/supabase.js?v=2"></script>
<script src="js/auth.js?v=2"></script>
<script src="js/player.js?v=2"></script>
<script>
/* ─── Music Browse App ──────────────────────────────── */
const MusicApp = {
  allTracks: [],
  albumIndex: {},
  artistIndex: {},
  currentView: 'all',
  currentParam: '',
  currentPage: 1,
  pageSize: 12,
  _lastBrowseHash: 'all',
  _playlistOpen: false,

  async init() {
    Player.init();
    try {
      const data = await dbSelect('music', { order: { col: 'created_at', dir: 'desc' } });
      this.allTracks = (data || []).reverse();
    } catch(e) {
      console.error('Music load failed:', e);
      this.allTracks = [];
      this._loadError = e.message || '加载失败';
    }
    Player.tracks = this.allTracks;
    Player._emit('playlist');
    Player._renderFloat();
    this.buildIndices();
    // Restore player state
    const st = Player._getState();
    if (st && st.playing && st.idx >= 0 && st.idx < this.allTracks.length) {
      Player.idx = st.idx;
      Player.audio.src = https(this.allTracks[st.idx]?.audio_url || '');
      if (st.pos > 0) Player.audio.currentTime = st.pos;
      Player.audio.play().catch(() => {});
      Player._updateInfo();
      Player.parseLyrics(this.allTracks[st.idx]?.lyrics || '');
    }
    document.getElementById("browseView").classList.add("loaded");
    this.route();
    window.addEventListener('hashchange', () => this.route());
    // Tab clicks
    document.querySelectorAll('#browseTabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#browseTabs button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const v = btn.dataset.view;
        if (v === 'all') this.navigate('all');
        else if (v === 'artists') this.navigate('artists');
        else if (v === 'albums') this.navigate('albums');
      });
    });
    // Player events
    Player.on('playlist', () => this._highlightPlaying());
    Player.on('track', () => this._highlightPlaying());
    // Init cover card B as hidden
    document.getElementById('coverCardB').style.opacity = '0';
    document.getElementById('coverCardB').style.pointerEvents = 'none';
  },

  buildIndices() {
    this.albumIndex = {};
    this.artistIndex = {};
    for (const t of this.allTracks) {
      const album = (t.album || '').trim() || '未分类专辑';
      if (album) {
        if (!this.albumIndex[album]) this.albumIndex[album] = { tracks: [], cover: '', description: '', genre: '', artist: '', year: '' };
        this.albumIndex[album].tracks.push(t);
        if (!this.albumIndex[album].cover && t.cover_url) this.albumIndex[album].cover = t.cover_url;
        if (!this.albumIndex[album].description && t.album_description) this.albumIndex[album].description = t.album_description;
        if (!this.albumIndex[album].genre && t.genre) this.albumIndex[album].genre = t.genre;
        if (!this.albumIndex[album].artist && t.album_artist) this.albumIndex[album].artist = t.album_artist;
        if (!this.albumIndex[album].year && t.album_year) this.albumIndex[album].year = t.album_year;
      }
      const artistRaw = (t.artist || '').trim() || '未知歌手';
      const artistList = artistRaw.split('/').map(function(s) { return s.trim(); }).filter(Boolean);
      if (!artistList.length) artistList.push('未知歌手');
      artistList.forEach(function(a) {
        if (!this.artistIndex[a]) this.artistIndex[a] = [];
        this.artistIndex[a].push(t);
      }, this);
    }
    for (var albumName in this.albumIndex) {
      this.albumIndex[albumName].tracks.sort(function(a, b) {
        var an = a.track_number || 9999;
        var bn = b.track_number || 9999;
        return an - bn;
      });
    }
  },

  /* ─── Routing ──────────────────────────────────── */
  route() {
    const hash = window.location.hash.replace('#', '') || 'all';
    if (hash === 'playing') { this.showPlayer(); return; }
    this._lastBrowseHash = hash;
    document.getElementById('browseView').style.display = '';
    var pv = document.getElementById('playerView');
    pv.classList.remove('open');
    pv.style.display = 'none';

    // Restore float player
    Player._renderFloat();
    // Parse hash
    const pageMatch = hash.match(/^all&page=(\d+)$/);
    if (pageMatch) { this.currentView = 'all'; this.currentPage = parseInt(pageMatch[1]) || 1; this.render(); return; }
    if (hash === 'all') { this.currentView = 'all'; this.currentPage = 1; this.render(); return; }
    if (hash === 'artists') { this.currentView = 'artists'; this.render(); return; }
    if (hash === 'albums') { this.currentView = 'albums'; this.render(); return; }
    const albumMatch = hash.match(/^album\/(.+)$/);
    if (albumMatch) {
      this.currentView = 'album';
      this.currentParam = decodeURIComponent(albumMatch[1]);
      document.querySelectorAll('#browseTabs button').forEach(b => { b.classList.remove('active'); if (b.dataset.view === 'albums') b.classList.add('active'); });
      this.render();
      return;
    }
    const artistMatch = hash.match(/^artist\/(.+)$/);
    if (artistMatch) {
      this.currentView = 'artist';
      this.currentParam = decodeURIComponent(artistMatch[1]);
      document.querySelectorAll('#browseTabs button').forEach(b => { b.classList.remove('active'); if (b.dataset.view === 'artists') b.classList.add('active'); });
      this.render();
      return;
    }
    this.navigate('all');
  },

  navigate(view, param) {
    if (view === 'all') window.location.hash = 'all';
    else if (view === 'artists') window.location.hash = 'artists';
    else if (view === 'albums') window.location.hash = 'albums';
    else if (view === 'album') window.location.hash = 'album/' + encodeURIComponent(param || '');
    else if (view === 'artist') window.location.hash = 'artist/' + encodeURIComponent(param || '');
  },

  setTab(view) {
    document.querySelectorAll('#browseTabs button').forEach(b => {
      b.classList.remove('active');
      if (b.dataset.view === view) b.classList.add('active');
    });
  },

  /* ─── Render ───────────────────────────────────── */
  render() {
    switch(this.currentView) {
      case 'all': this.renderAllSongs(); break;
      case 'artists': this.renderArtists(); break;
      case 'albums': this.renderAlbums(); break;
      case 'album': this.renderAlbumDetail(this.currentParam); break;
      case 'artist': this.renderArtistDetail(this.currentParam); break;
    }
    this._highlightPlaying();
    window.scrollTo({ top: 0, behavior: 'instant' });
  },

  renderAllSongs() {
    this.setTab('all');
    const total = this.allTracks.length;
    const totalPages = Math.max(1, Math.ceil(total / this.pageSize));
    if (this.currentPage > totalPages) this.currentPage = totalPages;
    const start = (this.currentPage - 1) * this.pageSize;
    const page = this.allTracks.slice(start, start + this.pageSize);

    let html = '';
    if (!page.length) {
      html = '<div class="empty-state"><i class="fas fa-music"></i>' +
        (this._loadError ? '<p style="color:#dc2626">加载失败：' + escHtml(this._loadError) + '</p><p style="font-size:.75rem;margin-top:4px">请确保已运行 SQL 迁移脚本，或查看浏览器控制台</p>' : '<p>暂无音乐</p>') +
        '</div>';
    } else {
      html = '<div class="song-list">';
      page.forEach((t, i) => {
        const globalIdx = this.allTracks.indexOf(t);
        const isPlaying = Player.idx === globalIdx && Player.playing;
        html += '<div class="song-row' + (isPlaying ? ' playing' : '') + '" data-track="' + globalIdx + '" onclick="MusicApp.playTrack(' + globalIdx + ')" style="animation-delay:' + (Math.min(i * 0.08, 0.8)).toFixed(2) + 's">' +
          '<span class="sr-num">' + (isPlaying ? '<i class="fas fa-play" style="font-size:8px"></i>' : (start + i + 1)) + '</span>' +
          '<img class="sr-cover" src="' + https(t.cover_url || '') + '" onerror="this.style.display=\'none\'" alt="">' +
          '<div class="sr-song-info"><span class="sr-title">' + escHtml(t.title) + '</span><span class="sr-artist">' + escHtml(fmtArtist(t.artist)) + '</span></div>' +
          '<span class="sr-album">' + escHtml(t.album || '—') + '</span>' +
          '<span class="sr-album">' + escHtml(t.genre || '—') + '</span>' +
          '<span class="sr-dur">' + (t.duration || '') + '</span>' +
        '</div>';
      });
      html += '</div>';
    }
    document.getElementById('browseMain').innerHTML = html;
    this.renderPagination(totalPages);
  },

  renderArtists() {
    this.setTab('artists');
    const collator = new Intl.Collator('zh-Hans-CN', { sensitivity: 'base' });
    const artists = Object.keys(this.artistIndex).sort(collator.compare);
    if (!artists.length) {
      document.getElementById('browseMain').innerHTML = '<div class="empty-state"><i class="fas fa-user-music"></i><p>暂无歌手</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }
    let html = '<div class="cards-grid">';
    artists.forEach((a, i) => {
      html += '<div class="artist-card" onclick="MusicApp.navigate(\'artist\',\'' + escAttr(a) + '\')" style="animation-delay:' + (Math.min(i * 0.08, 0.8)).toFixed(2) + 's">' +
        '<div class="gc-name">' + escHtml(a) + '</div>' +
        '<div class="gc-count">' + this.artistIndex[a].length + ' 首</div>' +
      '</div>';
    });
    html += '</div>';
    document.getElementById('browseMain').innerHTML = html;
    document.getElementById('pagination').innerHTML = '';
  },

  renderAlbums() {
    this.setTab('albums');
    const albums = Object.keys(this.albumIndex).sort((a, b) => this.albumIndex[b].tracks.length - this.albumIndex[a].tracks.length);
    if (!albums.length) {
      document.getElementById('browseMain').innerHTML = '<div class="empty-state"><i class="fas fa-compact-disc"></i><p>暂无专辑</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

  renderPagination(totalPages) {
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    const cp = this.currentPage;
    let btns = '';
    btns += '<button ' + (cp <= 1 ? 'disabled' : 'onclick="MusicApp.goPage(' + (cp - 1) + ')"') + '><i class="fas fa-chevron-left"></i></button>';
    const range = [];
    if (totalPages <= 7) {
      for (let i = 1; i <= totalPages; i++) range.push(i);
    } else {
      range.push(1);
      if (cp > 3) range.push('...');
      for (let i = Math.max(2, cp - 1); i <= Math.min(totalPages - 1, cp + 1); i++) range.push(i);
      if (cp < totalPages - 2) range.push('...');
      range.push(totalPages);
    }
    range.forEach(p => {
      if (p === '...') btns += '<span class="pg-ellipsis">...</span>';
      else btns += '<button class="' + (p === cp ? 'active' : '') + '" onclick="MusicApp.goPage(' + p + ')">' + p + '</button>';
    });
    btns += '<button ' + (cp >= totalPages ? 'disabled' : 'onclick="MusicApp.goPage(' + (cp + 1) + ')"') + '><i class="fas fa-chevron-right"></i></button>';
    document.getElementById('pagination').innerHTML = btns;
  },

  goPage(p) {
    this.currentPage = p;
    if (this.currentView === 'all') {

  /* ─── Highlight ─────────────────────────────────── */
  _highlightPlaying() {
    document.querySelectorAll('.song-row').forEach(function(row) {
      row.classList.remove('playing');
      var idx = parseInt(row.dataset.track);
      var isPlaying = idx === Player.idx && Player.playing;
      if (isPlaying) row.classList.add('playing');
      var num = row.querySelector('.sr-num');
      if (num) num.innerHTML = isPlaying ? '<i class="fas fa-play" style="font-size:8px"></i>' : (idx + 1);

};

/* ─── Escaper ────────────────────────────────────────── */
var _escDiv;
function escHtml(str) {
  if (!_escDiv) _escDiv = document.createElement('div');
  _escDiv.textContent = str || '';
  return _escDiv.innerHTML;
}
function fmtArtist(a) { return (a || '').replace(/\s*\/\s*/g, ' · '); }
function escAttr(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

/* ─── Boot ───────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  await initAuth();
  await MusicApp.init();

  // ─── Player event bindings ──────────────────────
  Player.on('play', () => {
    document.getElementById('btnPlay').innerHTML = '<i class="fas fa-pause"></i>';
    document.getElementById('coverCardA').classList.add('playing');
    document.getElementById('btnShuffle').classList.toggle('active-ctrl', Player.shuffle);
    document.getElementById('btnRepeat').classList.toggle('active-ctrl', Player.repeat);
  });

  Player.on('pause', () => {
    document.getElementById('btnPlay').innerHTML = '<i class="fas fa-play"></i>';
    document.getElementById('coverCardA').classList.remove('playing');
  });

  Player.on('track', (t) => {
    document.getElementById('muTitle').textContent = t.title || '未选择';
    document.getElementById('muArtist').textContent = t.artist || '—';
    document.getElementById('pnTitle').textContent = (t.title || '') + ' · ' + (t.artist || '');
    const coverUrl = t.cover_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%231a1a1a" width="200" height="200"/><text x="100" y="115" text-anchor="middle" font-size="50" fill="%236b8e5a">♪</text></svg>';
    const safeUrl = https(coverUrl);
    document.getElementById('coverImgA').src = safeUrl;
    document.getElementById('bgImg').src = safeUrl;
  });

  // Track switch animation
  var _activeCard = 'A';
  var _switchLocked = false;
  Player.on('transitionstart', function(data) {
    _switchLocked = true;
    var oldCard = document.getElementById('coverCard' + _activeCard);
    var newCard = document.getElementById('coverCard' + (_activeCard === 'A' ? 'B' : 'A'));
    var newImg = document.getElementById('coverImg' + (_activeCard === 'A' ? 'B' : 'A'));
    var t = Player.tracks[data.to];
    var coverUrl = t?.cover_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect fill="%231a1a1a" width="200" height="200"/><text x="100" y="115" text-anchor="middle" font-size="50" fill="%236b8e5a">♪</text></svg>';
    newImg.src = https(coverUrl);
    newCard.style.opacity = '1';
    newCard.style.pointerEvents = 'auto';
    var dir = data.dir > 0 ? 'next' : 'prev';
    oldCard.classList.add('switch-out-' + dir);
    newCard.classList.add('switch-in-' + dir);
    // Fade track info
    document.getElementById('trackInfo').classList.add('fading');
    // Remove old card playing state
    oldCard.classList.remove('playing');
  });
  Player.on('transitionend', function() {
    var oldCard = document.getElementById('coverCard' + _activeCard);
    var newCard = document.getElementById('coverCard' + (_activeCard === 'A' ? 'B' : 'A'));
    oldCard.className = 'cover-card';
    oldCard.style.opacity = '0';
    oldCard.style.pointerEvents = 'none';
    newCard.className = 'cover-card';
    if (Player.playing) newCard.classList.add('playing');
    // Swap active
    _activeCard = _activeCard === 'A' ? 'B' : 'A';
    // Restore track info
    document.getElementById('trackInfo').classList.remove('fading');
    // Update main cover img src for bg blur
    var activeImg = document.getElementById('coverImg' + _activeCard);
    if (activeImg && activeImg.src) {
      document.getElementById('bgImg').src = activeImg.src;
      document.getElementById('coverImg').src = activeImg.src;
    }
    _switchLocked = false;
  });

  Player.on('tick', ({ ct, dur, pct }) => {
    document.getElementById('progFill').style.width = pct + '%';
    document.getElementById('progDot').style.left = pct + '%';
    document.getElementById('curTime').textContent = Player.fmt(ct);
  });

  Player.on('durupdate', () => {
    document.getElementById('durTime').textContent = Player.fmt(Player.audio.duration);
  });

  Player.on('playlist', () => {
    renderPlaylist();
    document.getElementById('btnShuffle').classList.toggle('active-ctrl', Player.shuffle);
    document.getElementById('btnRepeat').classList.toggle('active-ctrl', Player.repeat);
  });


  /* ─── Fan-Shaped Lyrics ──────────────────────────── */
  Player.on('lyrics', (lyrics) => {
    const panel = document.getElementById('lyricsPanel');
    panel.querySelectorAll('.lyric-line').forEach(l => l.remove());
    const noEl = document.getElementById('noLyrics');
    if (noEl) noEl.style.display = lyrics.length ? 'none' : '';
    lyrics.forEach((l, i) => {
      const el = document.createElement('div');
      el.className = 'lyric-line';
      el.dataset.idx = i;
      el.dataset.time = l.time;
      el.textContent = l.text;
      el.onclick = () => { Player.audio.currentTime = l.time; };
      panel.appendChild(el);
    });
    // Reset fan state and render initial state for all lines
    _lastFanIdx = null; // force re-render even if activeIdx is -1
    updateFanLyrics(-1);
  });

  Player.on('lyricsync', (activeIdx) => {
    updateFanLyrics(activeIdx);
  });

  var _fanRaf = null, _lastFanIdx = -1;

  function updateFanLyrics(activeIdx) {
    if (activeIdx === _lastFanIdx) return;
    _lastFanIdx = activeIdx;
    if (_fanRaf) cancelAnimationFrame(_fanRaf);
    _fanRaf = requestAnimationFrame(function() {
      _fanRaf = null;
      _renderFanLyrics(activeIdx);
    });
  }

  function _renderFanLyrics(activeIdx) {
    var lines = document.querySelectorAll('#lyricsPanel .lyric-line');
    if (!lines.length) return;

    // Initial/neutral state: gentle uniform tilt
    if (activeIdx < 0) {
      for (var i = 0; i < lines.length; i++) {
        var l = lines[i];
        l.classList.remove('active', 'past');
        l.style.transform = 'perspective(1000px) rotateX(-5deg) translateY(12px) scale(0.92)';
        l.style.opacity = '0.4';
      }
      return;
    }

    var range = 12;
    var start = Math.max(0, activeIdx - range);
    var end = Math.min(lines.length, activeIdx + range + 1);

    // Far-away lines: subtle terminal state
    for (var i = 0; i < lines.length; i++) {
      if (i >= start && i < end) continue;
      var l = lines[i];
      l.classList.remove('active', 'past');
      if (i < activeIdx) {
        l.classList.add('past');
        l.style.transform = 'perspective(1000px) rotateX(18deg) translateY(-40px) scale(0.7)';
        l.style.opacity = '0.25';
      } else {
        l.style.transform = 'perspective(1000px) rotateX(-22deg) translateY(45px) scale(0.65)';
        l.style.opacity = '0.2';
      }
    }

    // Nearby lines: smooth fan interpolation
    for (var i = start; i < end; i++) {
      var l = lines[i];
      l.classList.remove('active', 'past');
      var dist = i - activeIdx;
      if (activeIdx >= 0 && i === activeIdx) {
        l.classList.add('active');
        l.style.transform = 'translateZ(30px) scale(1)';
        l.style.opacity = '1';
      } else if (activeIdx >= 0 && i < activeIdx) {
        l.classList.add('past');
        var factor = Math.min(Math.abs(dist), 5);
        var rx = factor * 4;
        var ty = -factor * 9;
        var sc = Math.max(0.7, 1 - factor * 0.06);
        var op = Math.max(0.28, 1 - factor * 0.12);
        l.style.transform = 'perspective(1000px) rotateX(' + rx + 'deg) translateY(' + ty + 'px) scale(' + sc + ')';
        l.style.opacity = op;
      } else if (activeIdx >= 0) {
        var factor = Math.min(Math.abs(dist), 5);
        var rx = -factor * 5;
        var ty = factor * 10;
        var sc = Math.max(0.65, 1 - factor * 0.07);
        var op = Math.max(0.22, 1 - factor * 0.13);
        l.style.transform = 'perspective(1000px) rotateX(' + rx + 'deg) translateY(' + ty + 'px) scale(' + sc + ')';
        l.style.opacity = op;
      }
    }

    // Scroll active line near center using container scroll
    if (activeIdx >= 0 && lines[activeIdx]) {
      var panel = document.getElementById('lyricsPanel');
      var line = lines[activeIdx];
      var target = line.offsetTop - panel.clientHeight / 2 + line.clientHeight / 2;
      panel.scrollTo({ top: target, behavior: 'smooth' });
    }
  }

  /* ─── Playlist rendering ────────────────────────── */
  function renderPlaylist() {
    const el = document.getElementById('plTracks');
    const count = document.getElementById('plCount');
    const badge = document.getElementById('plBadge');
    el.innerHTML = '';
    count.textContent = Player.tracks.length;
    if (badge) badge.textContent = Player.tracks.length;
    if (!Player.tracks.length) {
      el.innerHTML = '<div style="padding:20px;text-align:center;color:#555;font-size:.82rem">播放列表为空</div>';
      return;
    }
    Player.tracks.forEach((t, i) => {
      const div = document.createElement('div');
      div.className = 'pl-track' + (i === Player.idx ? ' active' : '');
      div.innerHTML =
        '<div class="pl-num">' + (i === Player.idx && Player.playing ? '<i class="fas fa-play" style="font-size:7px"></i>' : (i + 1)) + '</div>' +
        '<div class="pl-info"><div class="pl-t">' + escHtml(t.title || '未知') + '</div><div class="pl-a">' + escHtml(fmtArtist(t.artist) || '—') + '</div></div>' +
        '<div class="pl-dur">' + (t.duration || '--:--') + '</div>';
      div.onclick = () => {
        Player.play(i);
        // Auto-close playlist after selecting
        if (MusicApp._playlistOpen) MusicApp.togglePlaylist();
      };
      el.appendChild(div);
    });
  }

  /* ─── Progress bar drag ────────────────────────── */
  (function() {
    var bar = document.getElementById('progBar');
    var dragging = false;
    function seekFromEvent(e) {
      var rect = bar.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX);
      var frac = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
      Player.audio.currentTime = frac * (Player.audio.duration || 0);
    }
    bar.addEventListener('mousedown', function(e) {
      dragging = true; bar.classList.add('dragging'); seekFromEvent(e); e.preventDefault();
    });
    bar.addEventListener('touchstart', function(e) {
      dragging = true; bar.classList.add('dragging'); seekFromEvent(e); e.preventDefault();
    }, { passive: false });
    document.addEventListener('mousemove', function(e) { if (!dragging) return; seekFromEvent(e); });
    document.addEventListener('touchmove', function(e) { if (!dragging) return; seekFromEvent(e); }, { passive: false });
    document.addEventListener('mouseup', function() { if (!dragging) return; dragging = false; bar.classList.remove('dragging'); });
    document.addEventListener('touchend', function() { if (!dragging) return; dragging = false; bar.classList.remove('dragging'); });
  })();

  /* ─── 3D Tilt ──────────────────────────────────── */
  Player.initTilt(document.getElementById('coverCardA'));
  Player.initTilt(document.getElementById('coverCardB'));
  document.getElementById('volSlider').value = Player.audio.volume;

  /* ─── Keyboard shortcuts ───────────────────────── */
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case ' ': e.preventDefault(); Player.toggle(); break;
      case 'ArrowRight': e.preventDefault(); Player.audio.currentTime += 5; break;
      case 'ArrowLeft': e.preventDefault(); Player.audio.currentTime -= 5; break;
      case 'ArrowUp': e.preventDefault(); Player.setVolume(Math.min(1, Player.audio.volume + .05)); document.getElementById('volSlider').value = Player.audio.volume; break;
      case 'ArrowDown': e.preventDefault(); Player.setVolume(Math.max(0, Player.audio.volume - .05)); document.getElementById('volSlider').value = Player.audio.volume; break;
      case 'r': Player.toggleShuffle(); break;
      case 'l': Player.toggleRepeat(); break;
      case 'Escape':
        if (document.getElementById('playerView').classList.contains('open')) MusicApp.showBrowse();
        break;
    }
  });

  /* ─── Toast ────────────────────────────────────── */
  window.showToast = function(msg, type) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + (type || '');
    t.textContent = msg;
    c.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  };

  /* ─── Float player click → show player ─────────── */
  document.getElementById('floatPlayer').addEventListener('click', function(e) {
    if (e.target.closest('button')) return;
    if (Player.tracks.length && Player.idx >= 0) MusicApp.showPlayer();
  });

});
</script>
</body>
