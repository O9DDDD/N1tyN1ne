<div class="toast-container" id="toastContainer"></div>

<!-- ══════════════ Core Inline Scripts ══════════════ -->
<script>
// ─── Theme ──────────────────────────────────────────
const Theme = {
  init() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    this._updateIcon();
    this._listenSystem();
  },
  toggle() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    this._updateIcon();
  },
  _updateIcon() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var icon = document.querySelector('#themeToggle i');
    if (icon) icon.className = 'fas fa-' + (isDark ? 'sun' : 'moon');
  },
  _listenSystem() {
    var self = this;
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      if (!localStorage.getItem('theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : '');
        self._updateIcon();
      }
    });
  }
};
Theme.init();

// ─── UI Helpers ──────────────────────────────────────
const UI = {
  toggleNav() { document.getElementById('navLinks').classList.toggle('open'); },
  closeNav() { document.getElementById('navLinks').classList.remove('open'); },
  toast(msg, type) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + (type || '');
    t.textContent = msg;
    c.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  }
};

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Scroll Reveal ───────────────────────────────────
(function() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
  });
  window._revealObs = obs;
})();

// ─── Auth Modal ────────────────────────────────────
const Auth = {
  _isLogin: true,

  open(mode) {
    this._isLogin = mode !== 'register';
    document.getElementById('authTitle').textContent = this._isLogin ? '登录' : '注册';
    document.getElementById('authSubmit').textContent = this._isLogin ? '登录' : '注册';
    document.getElementById('authUsername').style.display = this._isLogin ? 'none' : 'block';
    document.getElementById('authSwitchText').innerHTML = this._isLogin
      ? '没有账号？<span onclick="Auth.switchMode()">注册</span>'
      : '已有账号？<span onclick="Auth.switchMode()">登录</span>';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authError').style.color = '#dc2626';
    document.getElementById('authModal').classList.add('open');
  },

  close() {
    document.getElementById('authModal').classList.remove('open');
  },

  switchMode() {
    this.open(this._isLogin ? 'register' : 'login');
  },

  async submit() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const username = document.getElementById('authUsername').value.trim();
    const errEl = document.getElementById('authError');
    errEl.style.display = 'none';

    if (!email || !password) {
      errEl.textContent = '请填写邮箱和密码';
      errEl.style.display = 'block';
      return;
    }

    try {
      if (this._isLogin) {
        if (typeof loginUser === 'function') {
          await loginUser(email, password);
          this.close();
        } else {
          errEl.textContent = '系统加载中，请稍后再试';
          errEl.style.display = 'block';
        }
      } else {
        if (!username) {
          errEl.textContent = '请输入用户名';
          errEl.style.display = 'block';
          return;
        }
        if (typeof register === 'function') {
          await register(email, password, username);
          this.close();
          if (typeof loadPosts === 'function') loadPosts();
          if (typeof Player !== 'undefined') Player.load();
          UI.toast('注册成功！欢迎，' + username);
        }
      }
    } catch (e) {
      errEl.textContent = e.message || '操作失败';
      errEl.style.color = '#dc2626';
      errEl.style.display = 'block';
    }
  }
};

document.getElementById('authModal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) Auth.close();
});

// ─── Button Ripple Effect ──────────────────────────
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.btn');
  if (!btn) return;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
});

// ─── Blog View ────────────────────────────────────
const Blog = {
  _current: null,
  _allPosts: [],

  close() {
    this._current = null;
    document.getElementById('postDetail').classList.remove('open');
    document.getElementById('postList').classList.add('open');
    document.getElementById('hero').scrollIntoView({ behavior: 'smooth' });
  },

  open(post) {
    this._current = post;
    document.getElementById('postList').classList.remove('open');
    document.getElementById('postDetail').classList.add('open');
    document.getElementById('pdTitle').textContent = post.title;
    document.getElementById('pdMeta').textContent = Blog.buildMeta(post);
    const body = document.getElementById('pdBody');
    if (typeof marked !== 'undefined') {
      body.innerHTML = marked.parse(post.content || '');
      body.querySelectorAll('a').forEach(a => a.setAttribute('target', '_blank'));
    } else {
      body.innerHTML = '<pre>' + (post.content || '').replace(/</g,'&lt;') + '</pre>';
    }
    document.getElementById('hero').scrollIntoView({ behavior: 'smooth' });
    if (typeof loadComments === 'function') loadComments(post.id);
  },

  buildMeta(post) {
    let parts = [];
    if (post.created_at) parts.push(new Date(post.created_at).toLocaleDateString('zh-CN'));
    parts.push('阅读约 ' + Blog.readingTime(post.content) + ' 分钟');
    return parts.join(' · ');
  },

  readingTime(text) {
    if (!text) return 1;
    const words = text.replace(/[#*`\[\]()>\-_\n]/g, ' ').split(/\s+/).filter(Boolean).length;
    return Math.max(1, Math.ceil(words / 300));
  },

  search(query) {
    if (!query || !query.trim()) {
      renderPosts(this._allPosts);
      return;
    }
    const q = query.toLowerCase().trim();
    const filtered = this._allPosts.filter(p =>
      p.title.toLowerCase().includes(q) ||
      (p.excerpt || '').toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q))
    );
    renderPosts(filtered);
  },

  filterByTag(tag) {
    document.getElementById('searchInput').value = '';
    const cards = document.querySelectorAll('.blog-card:not(.skeleton)');
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector('.tf-btn[data-tag="' + tag + '"]');
    if (btn) btn.classList.add('active');
    if (tag === '*') { renderPosts(this._allPosts); return; }
    const filtered = this._allPosts.filter(p => (p.tags || []).includes(tag));
    renderPosts(filtered);
  },

  async submitComment() {
    const text = document.getElementById('commentText')?.value.trim();
    if (!text || !this._current || !window._currentUser) return;
    try {
      await dbInsert('comments', { post_id: this._current.id, user_id: window._currentUser.id, content: text });
      document.getElementById('commentText').value = '';
      if (typeof loadComments === 'function') loadComments(this._current.id);
    } catch (e) { UI.toast('留言失败: ' + e.message, 'error'); }
  }
};

// ─── Site Content Loader ───────────────────────────
(function() {
  var defaults = {
    heroTitle: 'N1tyN1ne',
    heroDesc: '记录、思考、分享。',
    aboutTitle2: '音乐', aboutDesc2: '音乐是灵魂的深呼吸。喜欢电子、后摇、独立音乐，偶尔自己也做点东西。',
    aboutTitle3: '写作', aboutDesc3: '用文字记录思考。写技术文章，也写生活随笔。分享让知识更有价值。'
  };
  var s = {};
  try {
    var raw = localStorage.getItem('site_settings');
    if (raw) s = JSON.parse(raw);
  } catch(e) {}
  s = Object.assign({}, defaults, s);
  document.getElementById('heroTitle').textContent = s.heroTitle;
  document.getElementById('heroDesc').textContent = s.heroDesc;
  document.title = s.heroTitle;
  var t2 = document.getElementById('aboutTitle2'), d2 = document.getElementById('aboutDesc2');
  var t3 = document.getElementById('aboutTitle3'), d3 = document.getElementById('aboutDesc3');
  if (t2) t2.textContent = s.aboutTitle2;
  if (d2) d2.textContent = s.aboutDesc2;
  if (t3) t3.textContent = s.aboutTitle3;
  if (d3) d3.textContent = s.aboutDesc3;
})();
</script>
