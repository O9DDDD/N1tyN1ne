<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N1tyN1ne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>♪</text></svg>">
</head>
<body>

<!-- ═══ Navigation ═══ -->
<nav>
  <div class="container">
    <span class="logo">N1tyN1ne</span>
    <div class="nav-right">
      <span id="authUI"><button class="nav-btn" onclick="Auth.open()">登录</button></span>
      <button class="nav-toggle" onclick="UI.toggleNav()" aria-label="菜单"><i class="fas fa-bars"></i></button>
    </div>
    <div class="links" id="navLinks">
      <a href="#blog" onclick="UI.closeNav()">博客</a>
      <a href="#music" onclick="UI.closeNav()">音乐</a>
    </div>
  </div>
</nav>

<!-- ═══ Hero ═══ -->
<section id="hero" class="block-green">
  <div class="container">
    <h1>N1tyN1ne</h1>
    <p>代码 · 音乐 · 思考 · 生活</p>
    <div class="hero-btns">
      <a href="#blog" class="btn btn-primary">浏览博客</a>
      <a href="#music" class="btn btn-outline">听听音乐</a>
    </div>
  </div>
</section>

<!-- ═══ Blog ═══ -->
<section id="blog" class="block-black">
  <div class="container">
    <h2 class="section-title">博客</h2>
    <p class="section-subtitle">记录思考，分享见闻</p>

    <div id="postList" class="post-list open">
      <div class="blog-grid" id="blogGrid">
        <div class="blog-card skeleton"><div class="sk-line w-60"></div><div class="sk-line w-80"></div><div class="sk-line w-40"></div></div>
        <div class="blog-card skeleton"><div class="sk-line w-40"></div><div class="sk-line w-90"></div><div class="sk-line w-50"></div></div>
        <div class="blog-card skeleton"><div class="sk-line w-70"></div><div class="sk-line w-60"></div><div class="sk-line w-30"></div></div>
      </div>
    </div>

    <div id="postDetail" class="post-detail">
      <div class="back" onclick="Blog.close()"><i class="fas fa-arrow-left"></i> 返回</div>
      <h1 id="pdTitle"></h1>
      <div class="pd-meta" id="pdMeta"></div>
      <div class="body" id="pdBody"></div>

      <div class="comments" id="commentSection">
        <h3>留言</h3>
        <div id="commentInputArea"><div class="login-hint">要留言？<span onclick="Auth.open()">登录</span></div></div>
        <div id="commentList"></div>
      </div>
    </div>
  </div>
</section>

<!-- ═══ Music ═══ -->
<section id="music" class="block-green">
  <div class="container">
    <h2 class="section-title">音乐</h2>
    <p class="section-subtitle">听歌是灵魂的深呼吸</p>

    <div class="player-section">
      <div class="player-cover" id="playerCover">
        <img id="coverImg" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect fill='%231a1a1a' width='200' height='200'/><text x='100' y='115' text-anchor='middle' font-size='50' fill='%235a7c3e'>♪</text></svg>" alt="cover">
      </div>
      <div class="player-info">
        <div class="pi-title" id="songTitle">未选择歌曲</div>
        <div class="pi-artist" id="songArtist">—</div>

        <div class="controls">
          <button onclick="AudioPlayer.prev()"><i class="fas fa-step-backward"></i></button>
          <button class="play-btn" onclick="AudioPlayer.toggle()" id="playBtn"><i class="fas fa-play"></i></button>
          <button onclick="AudioPlayer.next()"><i class="fas fa-step-forward"></i></button>
          <button onclick="AudioPlayer.toggleShuffle()" id="shuffleBtn"><i class="fas fa-random"></i></button>
          <button onclick="AudioPlayer.toggleRepeat()" id="repeatBtn"><i class="fas fa-repeat"></i></button>
        </div>

        <div class="progress">
          <span id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar" onclick="AudioPlayer.seek(event)">
            <div class="fill" id="progressFill"></div>
            <div class="thumb" id="progressThumb"></div>
          </div>
          <span id="totalTime">0:00</span>
        </div>

        <div class="vol">
          <i class="fas fa-volume-down" style="font-size:.8rem"></i>
          <input type="range" min="0" max="1" step="0.01" id="volumeSlider" oninput="AudioPlayer.setVolume(this.value)">
        </div>

        <div class="lyrics-area" id="lyricsContainer">
          <div class="no-lyrics">暂无歌词</div>
        </div>
      </div>
    </div>

    <div class="playlist">
      <h4>播放列表</h4>
      <div class="pl-items" id="playlistItems">
        <div class="pl-item" style="opacity:.4;pointer-events:none">
          <div class="pl-idx">1</div>
          <div class="pl-i"><div class="pl-t">等待加载...</div><div class="pl-a">—</div></div>
          <div class="pl-d">--:--</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ═══ Footer ═══ -->
<footer>
  &copy; 2026 N1tyN1ne · Built with <span style="color:var(--grn)">♥</span>
</footer>

<!-- ═══ Auth Modal ═══ -->
<div class="auth-overlay" id="authModal">
  <div class="auth-box">
    <button class="close-btn" onclick="Auth.close()"><i class="fas fa-xmark"></i></button>
    <h2 id="authTitle">登录</h2>
    <div class="error-msg" id="authError"></div>
    <input type="email" id="authEmail" placeholder="邮箱">
    <input type="password" id="authPassword" placeholder="密码">
    <input type="text" id="authUsername" placeholder="用户名" style="display:none">
    <button class="btn btn-primary" id="authSubmit" onclick="Auth.submit()">登录</button>
    <div class="switch-link">
      <span id="authSwitchText">没有账号？<span onclick="Auth.switchMode()">注册</span></span>
    </div>
  </div>
</div>

<!-- ═══ Toast ═══ -->
<div class="toast-container" id="toastContainer"></div>

<!-- ══════════════ Core Inline Scripts ══════════════ -->
<script>
// ─── UI Helpers ──────────────────────────────────────
const UI = {
  toggleNav() { document.getElementById('navLinks').classList.toggle('open'); },
  closeNav() { document.getElementById('navLinks').classList.remove('open'); },
  toast(msg, type) {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'toast ' + (type || '');
    t.textContent = msg;
    c.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
  }
};

// ─── Auth Modal (no dependencies) ────────────────────
const Auth = {
  _isLogin: true,

  open(mode) {
    this._isLogin = mode !== 'register';
    document.getElementById('authTitle').textContent = this._isLogin ? '登录' : '注册';
    document.getElementById('authSubmit').textContent = this._isLogin ? '登录' : '注册';
    document.getElementById('authUsername').style.display = this._isLogin ? 'none' : 'block';
    document.getElementById('authSwitchText').innerHTML = this._isLogin
      ? '没有账号？<span onclick="Auth.switchMode()">注册</span>'
      : '已有账号？<span onclick="Auth.switchMode()">登录</span>';
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authError').style.color = '#ff4444';
    document.getElementById('authModal').classList.add('open');
  },

  close() {
    document.getElementById('authModal').classList.remove('open');
  },

  switchMode() {
    this.open(this._isLogin ? 'register' : 'login');
  },

  async submit() {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const username = document.getElementById('authUsername').value.trim();
    const errEl = document.getElementById('authError');
    errEl.style.display = 'none';

    if (!email || !password) {
      errEl.textContent = '请填写邮箱和密码';
      errEl.style.display = 'block';
      return;
    }

    try {
      if (this._isLogin) {
        if (typeof loginUser === 'function') {
          await loginUser(email, password);
          this.close();
        } else {
          errEl.textContent = '系统加载中，请稍后再试';
          errEl.style.display = 'block';
        }
      } else {
        if (!username) {
          errEl.textContent = '请输入用户名';
          errEl.style.display = 'block';
          return;
        }
        if (typeof register === 'function') {
          await register(email, password, username);
          errEl.textContent = '注册成功！请直接登录';
          errEl.style.color = 'var(--grn-bright)';
          errEl.style.display = 'block';
          this._isLogin = true;
          document.getElementById('authTitle').textContent = '登录';
          document.getElementById('authSubmit').textContent = '登录';
          document.getElementById('authUsername').style.display = 'none';
          document.getElementById('authSwitchText').innerHTML = '没有账号？<span onclick="Auth.switchMode()">注册</span>';
        }
      }
    } catch (e) {
      errEl.textContent = e.message || '操作失败';
      errEl.style.color = '#ff4444';
      errEl.style.display = 'block';
    }
  }
};

document.getElementById('authModal').addEventListener('click', function(e) {
  if (e.target === e.currentTarget) Auth.close();
});

// ─── Blog View ────────────────────────────────────────
const Blog = {
  _current: null,

  close() {
    this._current = null;
    document.getElementById('postDetail').classList.remove('open');
    document.getElementById('postList').classList.add('open');
  },

  open(post) {
    this._current = post;
    document.getElementById('postList').classList.remove('open');
    document.getElementById('postDetail').classList.add('open');
    document.getElementById('pdTitle').textContent = post.title;
    document.getElementById('pdMeta').textContent = post.created_at
      ? new Date(post.created_at).toLocaleDateString('zh-CN') : '';
    const body = document.getElementById('pdBody');
    if (typeof marked !== 'undefined') {
      body.innerHTML = marked.parse(post.content || '');
      body.querySelectorAll('a').forEach(a => a.setAttribute('target', '_blank'));
    } else {
      body.innerHTML = '<pre>' + (post.content || '').replace(/</g,'&lt;') + '</pre>';
    }
    document.getElementById('hero').scrollIntoView({ behavior: 'smooth' });
    if (typeof loadComments === 'function') loadComments(post.id);
  },

  async submitComment() {
    const text = document.getElementById('commentText')?.value.trim();
    if (!text || !this._current || !window._currentUser) return;
    try {
      await dbInsert('comments', { post_id: this._current.id, user_id: window._currentUser.id, content: text });
      document.getElementById('commentText').value = '';
      if (typeof loadComments === 'function') loadComments(this._current.id);
    } catch (e) { UI.toast('留言失败: ' + e.message, 'error'); }
  }
};
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>
</body>
</html>
