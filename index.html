<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N1tyN1ne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>♪</text></svg>">
</head>
<body>

<!-- ═══ Navigation ═══ -->
<nav>
  <div class="container">
    <span class="logo">N1tyN1ne</span>
    <div class="links">
      <a href="#blog">博客</a>
      <a href="#music">音乐</a>
      <span id="authUI"></span>
    </div>
  </div>
</nav>

<!-- ═══ Hero ═══ -->
<section id="hero" class="block-green">
  <div class="container">
    <h1>N1tyN1ne</h1>
    <p>代码 · 音乐 · 思考 · 生活</p>
    <div class="hero-btns">
      <a href="#blog" class="btn btn-primary">浏览博客</a>
      <a href="#music" class="btn btn-outline">听听音乐</a>
    </div>
  </div>
</section>

<!-- ═══ Blog ═══ -->
<section id="blog" class="block-black">
  <div class="container">
    <h2 class="section-title">博客</h2>
    <p class="section-subtitle">记录思考，分享见闻</p>

    <div id="postList" class="post-list open">
      <div class="blog-grid" id="blogGrid"></div>
    </div>

    <div id="postDetail" class="post-detail">
      <div class="back" onclick="closePost()"><i class="fas fa-arrow-left"></i> 返回</div>
      <h1 id="pdTitle"></h1>
      <div class="pd-meta" id="pdMeta"></div>
      <div class="body" id="pdBody"></div>

      <div class="comments" id="commentSection">
        <h3>留言</h3>
        <div id="commentInputArea"></div>
        <div id="commentList"></div>
      </div>
    </div>
  </div>
</section>

<!-- ═══ Music ═══ -->
<section id="music" class="block-green">
  <div class="container">
    <h2 class="section-title">音乐</h2>
    <p class="section-subtitle">听歌是灵魂的深呼吸</p>

    <div class="player-section" style="background:var(--blk-light)">
      <div class="player-cover" id="playerCover">
        <img id="coverImg" src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><rect fill='%231a1a1a' width='200' height='200'/><text x='100' y='115' text-anchor='middle' font-size='50' fill='%2300d95a'>♪</text></svg>" alt="cover">
      </div>
      <div class="player-info">
        <div class="pi-title" id="songTitle">未选择歌曲</div>
        <div class="pi-artist" id="songArtist">—</div>

        <div class="controls">
          <button onclick="player.prev()"><i class="fas fa-step-backward"></i></button>
          <button class="play-btn" onclick="player.toggle()" id="playBtn"><i class="fas fa-play"></i></button>
          <button onclick="player.next()"><i class="fas fa-step-forward"></i></button>
          <button onclick="player.toggleShuffle()" id="shuffleBtn"><i class="fas fa-random"></i></button>
          <button onclick="player.toggleRepeat()" id="repeatBtn"><i class="fas fa-repeat"></i></button>
        </div>

        <div class="progress">
          <span id="currentTime">0:00</span>
          <div class="progress-bar" id="progressBar" onclick="player.seek(event)">
            <div class="fill" id="progressFill"></div>
            <div class="thumb" id="progressThumb"></div>
          </div>
          <span id="totalTime">0:00</span>
        </div>

        <div class="vol">
          <i class="fas fa-volume-down" style="font-size:.8rem"></i>
          <input type="range" min="0" max="1" step="0.01" id="volumeSlider" oninput="player.setVolume(this.value)">
        </div>

        <div class="lyrics-area" id="lyricsContainer">
          <div class="no-lyrics">暂无歌词</div>
        </div>
      </div>
    </div>

    <div class="playlist">
      <h4>播放列表</h4>
      <div class="pl-items" id="playlistItems"></div>
    </div>
  </div>
</section>

<!-- ═══ Footer ═══ -->
<footer>
  &copy; 2026 N1tyN1ne · Built with <span style="color:var(--grn)">♥</span>
</footer>

<!-- ═══ Auth Modal ═══ -->
<div class="auth-overlay" id="authModal">
  <div class="auth-box">
    <button class="close-btn" onclick="closeAuth()"><i class="fas fa-xmark"></i></button>
    <h2 id="authTitle">登录</h2>
    <div class="error-msg" id="authError"></div>
    <input type="email" id="authEmail" placeholder="邮箱">
    <input type="password" id="authPassword" placeholder="密码">
    <input type="text" id="authUsername" placeholder="用户名" style="display:none">
    <button class="btn btn-primary" id="authSubmit" onclick="handleAuth()">登录</button>
    <div class="switch-link">
      <span id="authSwitchText">没有账号？<span onclick="switchAuth()">注册</span></span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>
</body>
</html>
