<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N1tyN1ne · 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚙</text></svg>">
  <style>
    .admin-nav { border-bottom-color: var(--grn); }
    .admin-layout { display: grid; grid-template-columns: 200px 1fr; min-height: calc(100vh - 56px); margin-top: 56px; }
    .admin-sidebar { background: var(--blk-light); border-right: 1px solid var(--border); padding: 20px 0; }
    .admin-sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 24px; color: var(--text-dim); font-size: .85rem; font-weight: 500; transition: var(--transition); border-left: 3px solid transparent; }
    .admin-sidebar a:hover, .admin-sidebar a.active { color: var(--grn); background: rgba(0,217,90,.04); border-left-color: var(--grn); }
    .admin-content { padding: 32px; overflow-y: auto; }
    .admin-content h2 { font-size: 1.4rem; font-weight: 700; color: var(--text-bright); margin-bottom: 24px; }
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: .82rem; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--blk); color: var(--text); font-size: .88rem; outline: none; font-family: inherit; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--grn-dark); }
    .form-group textarea { min-height: 200px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .admin-table th { text-align: left; padding: 10px 12px; color: var(--text-dim); font-weight: 600; border-bottom: 1px solid var(--border); font-size: .78rem; text-transform: uppercase; letter-spacing: .5px; }
    .admin-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .admin-table tr:hover td { background: rgba(255,255,255,.02); }
    .btn-sm { padding: 6px 14px; font-size: .78rem; border-radius: 4px; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
    .btn-ghost:hover { border-color: var(--grn-dark); color: var(--text-bright); }
    .tag-input { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; border: 1px solid var(--border); border-radius: 6px; background: var(--blk); }
    .tag-input .tag { background: var(--grn-dark); color: #fff; padding: 2px 10px; border-radius: 4px; font-size: .78rem; display: flex; align-items: center; gap: 6px; }
    .tag-input .tag .remove { cursor: pointer; font-size: .7rem; }
    .tag-input input { border: none; background: none; color: var(--text); padding: 4px 8px; font-size: .85rem; outline: none; flex: 1; min-width: 80px; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: .9rem; }
  </style>
</head>
<body>

<nav class="admin-nav">
  <div class="container">
    <span class="logo">N1tyN1ne · 管理</span>
    <div class="links">
      <a href="index.html" target="_blank"><i class="fas fa-external-link-alt"></i> 查看站点</a>
      <span id="adminAuthUI"></span>
    </div>
  </div>
</nav>

<div class="admin-layout" id="adminApp" style="display:none">
  <div class="admin-sidebar">
    <a href="#" class="active" data-section="dashboard"><i class="fas fa-chart-simple"></i> 概览</a>
    <a href="#" data-section="posts"><i class="fas fa-file-lines"></i> 文章</a>
    <a href="#" data-section="music"><i class="fas fa-music"></i> 音乐</a>
    <a href="#" data-section="comments"><i class="fas fa-comment"></i> 留言</a>
  </div>

  <div class="admin-content">

    <!-- Dashboard -->
    <div class="admin-section active" id="section-dashboard">
      <h2>概览</h2>
      <div class="form-row" style="margin-bottom:24px">
        <div class="stat-card" style="background:var(--blk-mid);padding:20px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center">
          <div class="num" style="font-size:2rem;font-weight:800;color:var(--grn)" id="dashPosts">0</div>
          <div class="label" style="color:var(--text-dim);font-size:.8rem;margin-top:4px">文章</div>
        </div>
        <div class="stat-card" style="background:var(--blk-mid);padding:20px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center">
          <div class="num" style="font-size:2rem;font-weight:800;color:var(--grn)" id="dashMusic">0</div>
          <div class="label" style="color:var(--text-dim);font-size:.8rem;margin-top:4px">音乐</div>
        </div>
        <div class="stat-card" style="background:var(--blk-mid);padding:20px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center">
          <div class="num" style="font-size:2rem;font-weight:800;color:var(--grn)" id="dashComments">0</div>
          <div class="label" style="color:var(--text-dim);font-size:.8rem;margin-top:4px">留言</div>
        </div>
      </div>
      <p style="color:var(--text-dim);font-size:.85rem">选择一个栏目开始管理。</p>
    </div>

    <!-- Posts -->
    <div class="admin-section" id="section-posts">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h2 style="margin:0">文章管理</h2>
        <button class="btn btn-primary" onclick="showPostEditor()" style="background:var(--grn-dark);color:#fff">+ 新文章</button>
      </div>
      <div id="postEditor" style="display:none;margin-bottom:24px;padding:20px;background:var(--blk-mid);border-radius:var(--radius-sm);border:1px solid var(--border)">
        <h3 id="editorTitle" style="font-size:1rem;font-weight:700;color:var(--text-bright);margin-bottom:16px">新文章</h3>
        <div class="form-group"><label>标题</label><input id="postTitle" placeholder="文章标题"></div>
        <div class="form-group"><label>摘要</label><input id="postExcerpt" placeholder="简短摘要"></div>
        <div class="form-group"><label>标签（逗号分隔）</label><input id="postTags" placeholder="技术, 生活, 音乐"></div>
        <div class="form-group"><label>内容（Markdown）</label><textarea id="postContent" placeholder="Markdown 内容..."></textarea></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" onclick="savePost()" style="background:var(--grn-dark);color:#fff">保存</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelPostEditor()">取消</button>
        </div>
        <input type="hidden" id="editPostId">
      </div>
      <table class="admin-table" id="postsTable">
        <thead><tr><th>标题</th><th>状态</th><th>日期</th><th>操作</th></tr></thead>
        <tbody id="postsBody"></tbody>
      </table>
    </div>

    <!-- Music -->
    <div class="admin-section" id="section-music">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h2 style="margin:0">音乐管理</h2>
        <button class="btn btn-primary" onclick="showMusicUpload()" style="background:var(--grn-dark);color:#fff">+ 上传音乐</button>
      </div>
      <div id="musicUploader" style="display:none;margin-bottom:24px;padding:20px;background:var(--blk-mid);border-radius:var(--radius-sm);border:1px solid var(--border)">
        <h3 style="font-size:1rem;font-weight:700;color:var(--text-bright);margin-bottom:16px">上传音乐</h3>
        <div class="form-row">
          <div class="form-group"><label>歌曲名</label><input id="muTitle" placeholder="歌曲名"></div>
          <div class="form-group"><label>艺术家</label><input id="muArtist" placeholder="艺术家"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>时长</label><input id="muDuration" placeholder="例如 4:30"></div>
          <div class="form-group"><label>音频文件 (MP3/FLAC)</label><input type="file" id="muAudio" accept="audio/*"></div>
        </div>
        <div class="form-group"><label>封面图片（可选）</label><input type="file" id="muCover" accept="image/*"></div>
        <div class="form-group"><label>歌词文件 (LRC, 可选)</label><input type="file" id="muLyrics" accept=".lrc,.txt"><span style="font-size:.78rem;color:var(--text-dim);margin-left:8px">上传 .lrc 文件或粘贴到下面</span></div>
        <div class="form-group"><label>或直接粘贴歌词（LRC 格式）</label><textarea id="muLyricsText" placeholder="[00:00.00]歌词..." style="min-height:100px"></textarea></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" onclick="uploadMusic()" style="background:var(--grn-dark);color:#fff" id="muSubmit">上传</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelMusicUpload()">取消</button>
        </div>
      </div>
      <table class="admin-table" id="musicTable">
        <thead><tr><th>歌曲</th><th>艺术家</th><th>日期</th><th>操作</th></tr></thead>
        <tbody id="musicBody"></tbody>
      </table>
    </div>

    <!-- Comments -->
    <div class="admin-section" id="section-comments">
      <h2>留言管理</h2>
      <table class="admin-table">
        <thead><tr><th>用户</th><th>内容</th><th>文章</th><th>日期</th><th>操作</th></tr></thead>
        <tbody id="commentsBody"></tbody>
      </table>
    </div>

  </div>
</div>

<div id="adminLoading" style="margin-top:120px;text-align:center;color:var(--text-dim);font-size:.9rem">
  <p>验证身份中...</p>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
