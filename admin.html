<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>N1tyN1ne · 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚙</text></svg>">
</head>
<body>

<nav class="admin-nav">
  <div class="container">
    <span class="logo">N1tyN1ne · 管理</span>
    <div class="nav-right">
      <span id="adminAuthUI"></span>
      <button class="nav-toggle" onclick="toggleNav()" aria-label="菜单"><i class="fas fa-bars"></i></button>
    </div>
    <div class="links" id="navLinks">
      <a href="index.html" target="_blank"><i class="fas fa-external-link-alt"></i> 查看站点</a>
    </div>
  </div>
</nav>

<div class="admin-layout" id="adminApp" style="display:none">
  <div class="admin-sidebar">
    <a href="#" class="active" data-section="dashboard"><i class="fas fa-chart-simple"></i> 概览</a>
    <a href="#" data-section="posts"><i class="fas fa-file-lines"></i> 文章</a>
    <a href="#" data-section="music"><i class="fas fa-music"></i> 音乐</a>
    <a href="#" data-section="comments"><i class="fas fa-comment"></i> 留言</a>
  </div>

  <div class="admin-content">

    <!-- Dashboard -->
    <div class="admin-section active" id="section-dashboard">
      <h2>概览</h2>
      <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:24px">
        <div class="stat-card" style="background:var(--blk-mid);padding:20px;border-radius:6px;border:1px solid var(--border);text-align:center">
          <div class="num" style="font-size:2rem;font-weight:800;color:var(--grn)" id="dashPosts">0</div>
          <div class="label" style="color:var(--text-dim);font-size:.8rem;margin-top:4px">文章</div>
        </div>
        <div class="stat-card" style="background:var(--blk-mid);padding:20px;border-radius:6px;border:1px solid var(--border);text-align:center">
          <div class="num" style="font-size:2rem;font-weight:800;color:var(--grn)" id="dashMusic">0</div>
          <div class="label" style="color:var(--text-dim);font-size:.8rem;margin-top:4px">音乐</div>
        </div>
        <div class="stat-card" style="background:var(--blk-mid);padding:20px;border-radius:6px;border:1px solid var(--border);text-align:center">
          <div class="num" style="font-size:2rem;font-weight:800;color:var(--grn)" id="dashComments">0</div>
          <div class="label" style="color:var(--text-dim);font-size:.8rem;margin-top:4px">留言</div>
        </div>
      </div>
      <p style="color:var(--text-dim);font-size:.85rem">选择一个栏目开始管理。</p>
    </div>

    <!-- Posts -->
    <div class="admin-section" id="section-posts">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h2 style="margin:0">文章管理</h2>
        <button class="btn btn-primary" onclick="showPostEditor()" style="background:var(--grn-dark);color:#fff">+ 新文章</button>
      </div>
      <div id="postEditor" style="display:none;margin-bottom:24px;padding:20px;background:var(--blk-mid);border-radius:var(--radius-sm);border:1px solid var(--border)">
        <h3 id="editorTitle" style="font-size:1rem;font-weight:700;color:var(--text-bright);margin-bottom:16px">新文章</h3>
        <div class="form-group"><label>标题</label><input id="postTitle" placeholder="文章标题"></div>
        <div class="form-group"><label>摘要</label><input id="postExcerpt" placeholder="简短摘要"></div>
        <div class="form-group"><label>标签（逗号分隔）</label><input id="postTags" placeholder="技术, 生活, 音乐"></div>
        <div class="form-group"><label>内容（Markdown）</label><textarea id="postContent" placeholder="Markdown 内容..."></textarea></div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" onclick="savePost()" style="background:var(--grn-dark);color:#fff">保存</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelPostEditor()">取消</button>
        </div>
        <input type="hidden" id="editPostId">
      </div>
      <div class="table-wrap">
        <table class="admin-table" id="postsTable">
          <thead><tr><th>标题</th><th>状态</th><th>日期</th><th>操作</th></tr></thead>
          <tbody id="postsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Music -->
    <div class="admin-section" id="section-music">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <h2 style="margin:0">音乐管理</h2>
        <button class="btn btn-primary" onclick="showMusicUpload()" style="background:var(--grn-dark);color:#fff">+ 上传音乐</button>
      </div>
      <div id="musicUploader" style="display:none;margin-bottom:24px;padding:20px;background:var(--blk-mid);border-radius:var(--radius-sm);border:1px solid var(--border)">
        <h3 style="font-size:1rem;font-weight:700;color:var(--text-bright);margin-bottom:16px">批量上传音乐</h3>

        <div id="dropZone" style="border:2px dashed var(--border);border-radius:8px;padding:40px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px">
          <i class="fas fa-cloud-upload-alt" style="font-size:2.5rem;color:var(--grn);display:block;margin-bottom:12px"></i>
          <p style="color:var(--text-bright);font-weight:600;margin:0 0 4px">拖拽音乐文件到此处</p>
          <p style="color:var(--text-dim);font-size:.82rem;margin:0 0 12px">支持 MP3 / FLAC / WAV / OGG / M4A / AAC，可以同时拖入 .lrc 歌词文件自动匹配</p>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();document.getElementById('muFileInput').click()" style="pointer-events:auto">或点击选择文件</button>
          <input type="file" id="muFileInput" multiple accept="audio/*,.lrc" style="display:none" onchange="addFiles(this.files);this.value=''">
        </div>

        <div id="uploadQueue" style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px"></div>

        <div id="muActions" style="display:none;gap:10px">
          <button class="btn btn-primary" onclick="uploadAll()" style="background:var(--grn-dark);color:#fff" id="muUploadAll">全部上传</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelMusicUpload()">取消</button>
        </div>
      </div>
      <div class="table-wrap">
        <table class="admin-table" id="musicTable">
          <thead><tr><th>歌曲</th><th>艺术家</th><th>日期</th><th>操作</th></tr></thead>
          <tbody id="musicBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Comments -->
    <div class="admin-section" id="section-comments">
      <h2>留言管理</h2>
      <div class="table-wrap">
        <table class="admin-table">
          <thead><tr><th>用户</th><th>内容</th><th>文章</th><th>日期</th><th>操作</th></tr></thead>
          <tbody id="commentsBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<div id="adminLoading" style="margin-top:120px;text-align:center;color:var(--text-dim);font-size:.9rem">
  <p>验证身份中...</p>
</div>

<script>
function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
function closeNav() { document.getElementById('navLinks').classList.remove('open'); }
</script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
// jsmediatags 多重 CDN 加载（中国网络兼容）
(function() {
  var urls = [
    'https://cdn.jsdelivr.net/npm/jsmediatags@3.9.7/dist/jsmediatags.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.7/jsmediatags.min.js',
    'https://unpkg.com/jsmediatags@3.9.7/dist/jsmediatags.min.js'
  ];
  var loaded = false;
  function tryLoad(i) {
    if (i >= urls.length) return;
    var s = document.createElement('script');
    s.src = urls[i];
    s.onload = function() { loaded = true; };
    s.onerror = function() { if (!loaded) tryLoad(i + 1); };
    document.head.appendChild(s);
  }
  tryLoad(0);
})();
</script>
<script src="js/admin.js"></script>
</body>
</html>
